            <div class="color-dropdown-list" id="colorDropdownList" style="width:120px;max-height:none;overflow:visible;">
              ${DOC_COLORS.map((c,i)=>`<div class="color-dropdown-opt${selColorId===c.id?' active':''}" data-cid="${c.id}" onclick="selectDocColor('${c.id}')" style="justify-content:center;">
                <span class="color-dropdown-opt-dot" style="background:${c.dot};width:24px;height:24px;flex-shrink:0;"></span>
              </div>`).join('')}
            </div>
            <input type="hidden" id="dc_colorId" value="${selColorId}">
          </div>
        </div>
      </div>
    </div>
    <div class="edit-row"><label class="edit-label">科別</label><input class="edit-inp" id="dc_title" value="${doc?doc.title:'耳鼻喉科'}" placeholder="例：耳鼻喉科"></div>
    <div class="edit-row">
      <label class="edit-label">每日預約上限人數</label>
      <div style="display:flex;align-items:center;gap:10px;margin-top:2px;">
        <div style="display:flex;align-items:center;gap:8px;">
          <span style="font-size:12px;color:var(--text2);font-weight:600;">上午</span>
          <input class="edit-inp" id="dc_limit_am" type="number" min="0" max="50" value="${doc?(doc.limitAM??3):3}" style="width:70px;text-align:center;">
          <span style="font-size:12px;color:var(--text2);">人</span>
        </div>
        <span style="font-size:14px;color:var(--text3);font-weight:400;">，</span>
        <div style="display:flex;align-items:center;gap:8px;">
          <span style="font-size:12px;color:var(--text2);font-weight:600;">下午</span>
          <input class="edit-inp" id="dc_limit_pm" type="number" min="0" max="50" value="${doc?(doc.limitPM??3):3}" style="width:70px;text-align:center;">
          <span style="font-size:12px;color:var(--text2);">人</span>
        </div>
      </div>
    </div>
    <div class="modal-divider"></div>
    <div class="edit-label" style="margin-bottom:8px;">可執行術式</div>
    <div class="ops-tags" id="opsTags" onclick="document.getElementById('opsTagInp').focus()">
      ${existingOps.map(o=>`<span class="ops-tag" data-op="${o}">${o}<button class="ops-tag-del" onclick="removeOpsTag(this)">×</button></span>`).join('')}
      <input class="ops-tag-inp" id="opsTagInp" onkeydown="handleOpsTagKey(event)">
    </div>
    <div style="font-size:11px;color:var(--text3);margin-top:5px;">按 Enter 新增，點擊 × 刪除</div>`;
  // no ops preview needed
}

function toggleColorDropdown(){
  document.getElementById('colorDropdownList').classList.toggle('open');
}

function selectDocColor(cid){
  document.getElementById('dc_colorId').value=cid;
  const c=DOC_COLORS.find(x=>x.id===cid)||DOC_COLORS[0];
  document.getElementById('colorBtnDot').style.background=c.dot;
  document.querySelectorAll('.color-dropdown-opt').forEach(el=>{
    el.classList.toggle('active',el.dataset.cid===cid);
  });
  document.getElementById('colorDropdownList').classList.remove('open');
}

function updateOpsPreview(){
  const preview=document.getElementById('dc_ops_preview');
  if(!preview)return;
  const cid=(document.getElementById('dc_colorId')||{}).value||'c1';
  const c=DOC_COLORS.find(x=>x.id===cid)||DOC_COLORS[0];
  const ops=[...document.querySelectorAll('#opsTags .ops-tag')].map(t=>t.dataset.op);
  preview.innerHTML=ops.length
    ?ops.map(o=>`<span style="font-size:11px;font-weight:600;padding:2px 9px;border-radius:10px;background:${c.bg};color:${c.text};border:1px solid ${c.border};">${o}</span>`).join('')
    :`<span style="font-size:11px;color:var(--text3);">新增術式後顯示顏色預覽</span>`;
}



function handleOpsTagKey(e){
  if(e.key==='Enter'||e.key===','){
    e.preventDefault();
    const v=e.target.value.trim();
    if(!v)return;
    const tags=document.getElementById('opsTags');
    const existing=[...tags.querySelectorAll('.ops-tag')].map(t=>t.dataset.op);
    if(existing.includes(v)){toast('warn','術式已存在');return;}
    const tag=document.createElement('span');
    tag.className='ops-tag';tag.dataset.op=v;
    tag.innerHTML=`${v}<button class="ops-tag-del" onclick="removeOpsTag(this)">×</button>`;
    tags.insertBefore(tag,e.target);
    e.target.value='';
  }
}

function removeOpsTag(btn){
  btn.parentElement.remove();
}

function getSelectedOps(){
  return [...document.querySelectorAll('#opsTags .ops-tag')].map(t=>t.dataset.op);
}

function openAddDoctor(){
  document.getElementById('modalTitle').textContent='新增醫師';
  document.getElementById('modal').className='modal wide';
  doctorModal(null);
  document.getElementById('modalFoot').innerHTML=`<div class="modal-acts">
    <button class="mbtn mbtn-approve" onclick="saveAddDoctor()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>新增</button>
    <button class="mbtn mbtn-close" onclick="closeModal()">取消</button>
  </div>`;
  openOverlay();
}

function saveAddDoctor(){
  const name=document.getElementById('dc_name').value.trim();
  if(!name){toast('err','請填寫醫師姓名');return;}
  const ops=getSelectedOps();
  const colorId=document.getElementById('dc_colorId').value||'c1';
  const limitAM=parseInt(document.getElementById('dc_limit_am').value)??3;
  const limitPM=parseInt(document.getElementById('dc_limit_pm').value)??3;
  const newId=doctors.length?Math.max(...doctors.map(d=>d.id))+1:1;
  const newDoc={id:newId,name,title:document.getElementById('dc_title').value.trim()||'耳鼻喉科',colorId,limitAM,limitPM,ops};
  doctors.push(newDoc);
  closeModal();renderDoctors();toast('success',`${name} 醫師已新增，請記得按「儲存醫師」同步到雲端`);
}

function saveDoctorsToDB(){
  if(window._fbSaveAllDoctors) window._fbSaveAllDoctors(doctors);
  else toast('warn','Firebase 尚未連線，請稍後再試');
}

function openEditDoctor(id){
  const doc=doctors.find(d=>d.id===id);if(!doc)return;
  document.getElementById('modalTitle').textContent='編輯醫師';
  document.getElementById('modal').className='modal wide';
  doctorModal(doc);
  document.getElementById('modalFoot').innerHTML=`<div class="modal-acts">
    <button class="mbtn mbtn-approve" onclick="saveEditDoctor(${id})"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="20 6 9 17 4 12"/></svg>儲存</button>
    <button class="mbtn mbtn-close" onclick="closeModal()">取消</button>
  </div>`;
  openOverlay();
}

function saveEditDoctor(id){
  const doc=doctors.find(d=>d.id===id);if(!doc)return;
  doc.name=document.getElementById('dc_name').value.trim()||doc.name;
  doc.title=document.getElementById('dc_title').value.trim()||doc.title;
  doc.colorId=document.getElementById('dc_colorId').value||doc.colorId||'c1';
  doc.limitAM=parseInt(document.getElementById('dc_limit_am').value)??doc.limitAM??3;
  doc.limitPM=parseInt(document.getElementById('dc_limit_pm').value)??doc.limitPM??3;
  doc.ops=getSelectedOps();
  if(window._fbSaveDoctor) window._fbSaveDoctor(doc);
  closeModal();renderDoctors();toast('success','醫師資料已更新');
}

function deleteDoctor(id){
  const doc=doctors.find(d=>d.id===id);if(!doc)return;
  if(!confirm(`確定要刪除 ${doc.name} 醫師？`))return;
  if(window._fbDeleteDoctor) window._fbDeleteDoctor(id);
  doctors=doctors.filter(d=>d.id!==id);
  renderDoctors();toast('warn','醫師已刪除');
}

/* ═══════════════════════════════════════
   REVIEW
═══════════════════════════════════════ */
let reviewActiveDocId = null;
let reviewUnlockedDocId = null; // which doctor tab is currently unlocked

function updateReviewBadge(){
  const n=bookings.filter(b=>b.status==='pending').length;
  const badge=document.getElementById('reviewBadge');
  if(!badge)return;
  if(n>0){badge.textContent=n;badge.style.display='inline-flex';}
  else{badge.style.display='none';}
}

function renderReviewDocTabs(){
  const tabs=document.getElementById('reviewDocTabs');
  if(!tabs)return;
  // Only per-doctor tabs, no "all"
  let html='';
  doctors.forEach(d=>{
    const dc=docColor(d.id);
    const cnt=bookings.filter(b=>b.status==='pending'&&b.docId===d.id).length;
    const isActive=reviewActiveDocId===d.id;
    html+=`<button class="doc-tab${isActive?' active':''}" onclick="selectReviewDoc(${d.id})"
      style="${isActive?`color:${dc.dot};border-bottom-color:${dc.dot};`:''}"
    ><span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:${dc.dot};margin-right:5px;"></span>${d.name}
      <span style="font-size:10px;background:${dc.bg};color:${dc.text};border:1px solid ${dc.border};border-radius:10px;padding:1px 6px;margin-left:4px;">${cnt}</span>
    </button>`;
  });
  tabs.innerHTML=html;
}

function selectReviewDoc(docId){
  if(reviewActiveDocId===docId) return; // already on this tab
  reviewActiveDocId=docId;
  reviewUnlockedDocId=null; // auto-lock on tab switch
  renderReview();
}

function reviewToggleDocLock(){
  reviewUnlockedDocId=(reviewUnlockedDocId===reviewActiveDocId)?null:reviewActiveDocId;
  renderReview();
}

function renderReview(){
  // default to first doctor if none selected
  if(reviewActiveDocId===null && doctors.length) reviewActiveDocId=doctors[0].id;
  renderReviewDocTabs();

  const t=document.getElementById('reviewTable');
  if(!doctors.length){ t.innerHTML=''; return; }

  let data=bookings.filter(b=>b.status==='pending'&&b.docId===reviewActiveDocId);
  data.sort((a,b)=>a.date.localeCompare(b.date)||a.slot.localeCompare(b.slot));

  const dc=docColor(reviewActiveDocId);
  const unlocked=reviewUnlockedDocId===reviewActiveDocId;

  // inject hover color CSS var into the table wrapper
  const wrap=document.getElementById('panel-review');
  if(wrap){
    wrap.style.setProperty('--rev-hover-bg', dc.bg);
    wrap.style.setProperty('--rev-hover-border', dc.border);
  }

  if(!data.length){
    t.innerHTML=`<tbody><tr><td colspan="7"><div class="review-empty">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg>
      ${doctors.find(d=>d.id===reviewActiveDocId)?.name||''} 醫師目前沒有待審核的預約
    </div></td></tr></tbody>`;
    _renderReviewLockBar(dc, false, 0);
    return;
  }

  t.innerHTML=`<thead><tr>
    <th>姓名</th><th>生日</th><th>手術日期</th><th>時段</th><th>術式</th><th>備註</th><th>操作</th>
  </tr></thead><tbody>${data.map(b=>{
    return`<tr class="rev-row">
      <td class="td-name">${b.name}</td>
      <td style="font-size:12px;color:var(--text2);">${fmtBday(b.bday)||'—'}</td>
      <td class="td-date">${fmtDate(b.date)}</td>
      <td style="font-weight:700;font-size:13px;">${b.slot}</td>
      <td style="font-size:12px;">${b.op||'—'}</td>
      <td style="font-size:12px;color:var(--text2);max-width:100px;" title="${b.note||''}">${b.note?(b.note.length>10?b.note.slice(0,10)+'…':b.note):'—'}</td>
      <td><div class="act-row">
        ${unlocked
          ?`<button class="icon-btn ib-approve" title="核准" onclick="reviewApprove(${b.id})"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="20 6 9 17 4 12"/></svg></button>
            <button class="icon-btn ib-reject" title="拒絕" onclick="reviewReject(${b.id})"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>`
          :`<span style="font-size:11px;color:var(--text3);">請先解鎖</span>`}
      </div></td>
    </tr>`;
  }).join('')}</tbody>`;

  _renderReviewLockBar(dc, unlocked, data.length);
}

function _renderReviewLockBar(dc, unlocked, count){
  // insert lock bar above table inside tbl-wrap
  const existing=document.getElementById('reviewLockBar');
  const wrap=document.querySelector('#panel-review .tbl-wrap');
  if(!wrap)return;

  const bar=existing||document.createElement('div');
  bar.id='reviewLockBar';
  bar.style.cssText=`display:flex;align-items:center;justify-content:space-between;padding:10px 16px;background:${unlocked?dc.bg:'#F8FAFC'};border-bottom:1px solid ${unlocked?dc.border:'var(--border)'};transition:all .2s;`;
  bar.innerHTML=`
    <div style="display:flex;align-items:center;gap:8px;font-size:12px;color:${unlocked?dc.text:'var(--text2)'};">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" style="width:14px;height:14px;">
        ${unlocked
          ?`<rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/>`
          :`<rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0"/>`}
      </svg>
      ${unlocked?'已解鎖，可進行核准或拒絕操作':'已鎖定，點擊解鎖後才能操作'}
      ${count?`<span style="font-size:11px;padding:1px 7px;border-radius:10px;background:${dc.bg};color:${dc.text};border:1px solid ${dc.border};">${count} 筆待審核</span>`:''}
    </div>
    <button onclick="reviewToggleDocLock()" style="display:flex;align-items:center;gap:6px;padding:6px 14px;border-radius:var(--rx);border:1.5px solid ${unlocked?dc.dot:'var(--border)'};background:${unlocked?dc.dot:'var(--white)'};color:${unlocked?'white':'var(--text2)'};font-size:12px;font-weight:700;cursor:pointer;transition:all .2s;">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" style="width:13px;height:13px;">
        ${unlocked
          ?`<rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/>`
          :`<rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0"/>`}
      </svg>
      ${unlocked?'回鎖':'解鎖'}
    </button>`;

  if(!existing){
    const tbl=document.getElementById('reviewTable');
    wrap.insertBefore(bar, tbl);
  }
}

function reviewApprove(id){
  const b=bookings.find(x=>x.id===id);if(!b)return;
  b.status='approved';
  window._fbReady.then(()=>{ if(b.fbId) window._fbApprove(b.fbId); });
  renderReview();renderBookings();updateReviewBadge();
  if(document.getElementById('panel-calendar').classList.contains('active')) renderCal();
  toast('success',`${b.name} 已核准`);
}

function reviewReject(id){
  const b=bookings.find(x=>x.id===id);if(!b)return;
  b.status='rejected';
  window._fbReady.then(()=>{ if(b.fbId) window._fbReject(b.fbId); });
  renderReview();renderBookings();updateReviewBadge();
  if(document.getElementById('panel-calendar').classList.contains('active')) renderCal();
  toast('warn',`${b.name} 已拒絕`);
}


function openOverlay(){document.getElementById('overlay').classList.add('open');}
function closeModal(){document.getElementById('overlay').classList.remove('open');}
function closeOverlay(e){if(e.target===document.getElementById('overlay'))closeModal();}

// close color dropdown when clicking outside
document.addEventListener('click',function(e){
  const wrap=document.getElementById('colorDropdownWrap');
  if(wrap&&!wrap.contains(e.target)){
    const list=document.getElementById('colorDropdownList');
    if(list)list.classList.remove('open');
  }
});

/* ═══════════════════════════════════════
   INIT
═══════════════════════════════════════ */
// fbReady: resolves when Firebase module finishes loading
let _fbReadyResolve;
window._fbReady = new Promise(res=>{ _fbReadyResolve=res; });
window._fbReadyResolve = _fbReadyResolve;

renderBookings();
updateReviewBadge();
</script>

<!-- Firebase compat SDK (避免 Netlify 壓縮 module 導致函數名稱被混淆) -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script>
(function(){
  const firebaseConfig = {
    apiKey: "AIzaSyBjRFH3IbVh-l6Wv6yscGnSZS3qxcKWrX4",
    authDomain: "lelin-clinic.firebaseapp.com",
    projectId: "lelin-clinic",
    storageBucket: "lelin-clinic.firebasestorage.app",
    messagingSenderId: "90788897823",
    appId: "1:90788897823:web:6fa7524bcdc68dc7b8e12a"
  };
  firebase.initializeApp(firebaseConfig);
  const db = firebase.firestore();

  // ── 即時監聽 bookings ──
  db.collection('bookings').onSnapshot(snap=>{
    bookings = snap.docs.map(d=>{
      const v=d.data();
      return {
        id:v.id||d.id, fbId:d.id,
        name:v.name||'', bday:v.bday||'',
        phone:v.phone||'', date:v.date||'',
        slot:v.slot||'', op:v.op||'',
        docId:v.docId||null,
        docName:v.docName||'',
        note:v.note||'',
        status:v.status||'pending',
        lineNotified:v.lineNotified||false,
        ts:v.createdAt?.toMillis?.()||Date.now(),
      };
    });
    renderBookings(); renderReview(); updateReviewBadge();
    if(document.getElementById('panel-calendar').classList.contains('active')) renderCal();
  });

  // ── 即時監聽 doctors ──
  db.collection('doctors').onSnapshot(snap=>{
    doctors = snap.docs.map(d=>{
      const v=d.data();
      return {id:v.id,name:v.name||'',title:v.title||'',
        colorId:v.colorId||'c1',limitAM:v.limitAM??3,
        limitPM:v.limitPM??3,ops:v.ops||[]};
    }).sort((a,b)=>a.id-b.id);
    renderDoctors();
  });

  // ── 即時監聽 slots ──
  db.collection('slots').onSnapshot(snap=>{
    slotSettings={};
    snap.docs.forEach(d=>{ const v=d.data(); if(v.slots) slotSettings[d.id]=v.slots; });
    if(document.getElementById('panel-schedule').classList.contains('active')) renderSlotCal();
  });

  // ── 儲存所有醫師 ──
  window.saveDoctorsToDB = async function(){
    const btn=document.querySelector('[onclick="saveDoctorsToDB()"]');
    if(btn){btn.disabled=true;btn.textContent='儲存中…';}
    try{
      await Promise.all(doctors.map(d=>
        db.collection('doctors').doc(String(d.id)).set(
          {id:d.id,name:d.name,title:d.title,colorId:d.colorId,
           limitAM:d.limitAM,limitPM:d.limitPM,ops:d.ops}
        )
      ));
      toast('success','所有醫師資料已儲存到雲端');
    }catch(e){ toast('err','儲存失敗：'+e.message); }
    finally{
      if(btn){btn.disabled=false;btn.innerHTML='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" style="width:14px;height:14px;"><path d="M19 21H5a2 2 0 01-2-2V5a2 2 0 012-2h11l5 5v11a2 2 0 01-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg> 儲存醫師';}
    }
  };

  // ── 刪除醫師 ──
  window._fbDeleteDoctor = function(id){
    db.collection('doctors').doc(String(id)).delete()
      .catch(e=>toast('err','刪除失敗：'+e.message));
  };

  // ── 儲存所有時段 ──
  window.saveSlotsToDB = async function(){
    const btn=document.querySelector('[onclick="saveSlotsToDB()"]');
    if(btn){btn.disabled=true;btn.textContent='儲存中…';}
    try{
      await Promise.all(Object.entries(slotSettings).map(([k,v])=>
        db.collection('slots').doc(k).set({slots:v})
      ));
      toast('success','時段已儲存到雲端');
    }catch(e){ toast('err','儲存失敗：'+e.message); }
    finally{
      if(btn){btn.disabled=false;btn.innerHTML='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" style="width:14px;height:14px;"><path d="M19 21H5a2 2 0 01-2-2V5a2 2 0 012-2h11l5 5v11a2 2 0 01-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg> 儲存時段';}
    }
  };

  // ── bookings CRUD ──
  window._fbApprove = function(fbId){
    db.collection('bookings').doc(fbId).update({status:'approved'})
      .catch(e=>toast('err','操作失敗'));
  };
  window._fbReject = function(fbId){
    db.collection('bookings').doc(fbId).update({status:'rejected'})
      .catch(e=>toast('err','操作失敗'));
  };
  window._fbDelete = function(fbId){
    db.collection('bookings').doc(fbId).delete()
      .catch(e=>toast('err','刪除失敗'));
  };
  window._fbToggleLine = function(fbId){
    db.collection('bookings').doc(fbId).update({lineNotified:true})
      .catch(e=>toast('err','操作失敗'));
  };
  window._fbSaveEdit = function(fbId,data){
    db.collection('bookings').doc(fbId).update(data)
      .catch(e=>toast('err','儲存失敗'));
  };

  // resolve fbReady
  window._fbReadyResolve();
})();
</script>
</body>
