window.toggleGlobalDay = function(d){
  if(!doctorDefaultSlots[globalSettingDocId]) doctorDefaultSlots[globalSettingDocId]={days:[],slots:[]};
  const days=doctorDefaultSlots[globalSettingDocId].days;
  const idx=days.indexOf(d); if(idx>=0) days.splice(idx,1); else days.push(d);
  renderGlobalTimeBody();
}

window.addGlobalSlot = function(){
  const h=document.getElementById('gs_h').value,min=document.getElementById('gs_m').value;
  if(!h||min===''){toast('warn','請選擇時與分');return;}
  const slot=h+':'+min;
  const doc=doctors.find(d=>d.id===globalSettingDocId);
  if(doc){
    const am=parseInt(h)<12;
    if(am && doc.limitAM===0){toast('warn','該醫師上午人數上限為 0，無法新增上午時段');return;}
    if(!am && doc.limitPM===0){toast('warn','該醫師下午人數上限為 0，無法新增下午時段');return;}
  }
  if(!doctorDefaultSlots[globalSettingDocId]) doctorDefaultSlots[globalSettingDocId]={days:[],slots:[]};
  const arr=doctorDefaultSlots[globalSettingDocId].slots;
  if(arr.includes(slot)){toast('warn','已存在');return;}
  arr.push(slot);arr.sort();renderGlobalTimeBody();
}

window.delGlobalSlot = function(i){
  doctorDefaultSlots[globalSettingDocId].slots.splice(i,1);renderGlobalTimeBody();
}

window.applyGlobalSettings = function(){
  if(!globalSettingDocId){toast('warn','請選擇醫師');return;}
  const cfg=doctorDefaultSlots[globalSettingDocId];
  if(!cfg||!cfg.days.length||!cfg.slots.length){toast('warn','請設定星期和時段');return;}
  const doc=doctors.find(d=>d.id===globalSettingDocId);
  // filter out slots blocked by limit=0
  const allowedSlots=cfg.slots.filter(s=>{
    const am=isAM(s);
    if(am && doc && doc.limitAM===0) return false;
    if(!am && doc && doc.limitPM===0) return false;
    return true;
  });
  if(!allowedSlots.length){toast('warn','所有時段皆因人數上限為 0 而無法套用');return;}
  const y=slotCalDate.getFullYear(),m=slotCalDate.getMonth();
  const days=new Date(y,m+1,0).getDate(); let count=0;
  for(let d=1;d<=days;d++){
    const dt=new Date(y,m,d);
    if(!cfg.days.includes(dt.getDay())) continue;
    const ds=`${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const booked=getBookedSlots(ds);
    const cur=getDocSlots(globalSettingDocId,ds);
    const merged=[...new Set([...cur,...allowedSlots])].filter(s=>!booked.includes(s)||cur.includes(s));
    setDocSlots(globalSettingDocId,ds,merged); count++;
  }
  if(globalSettingDocId===slotActiveDocId) renderSlotCal();
  closeModal2(); toast('success',`已套用到本月 ${count} 天`);
}

function handleOpsTagKey(e){
  if(e.key==='Enter'||e.key===','){
    e.preventDefault();
    const v=e.target.value.trim();
    if(!v)return;
    const tags=document.getElementById('opsTags');
    const existing=[...tags.querySelectorAll('.ops-tag')].map(t=>t.dataset.op);
    if(existing.includes(v)){toast('warn','術式已存在');return;}
    const tag=document.createElement('span');
    tag.className='ops-tag';tag.dataset.op=v;
    tag.innerHTML=`${v}<button class="ops-tag-del" onclick="removeOpsTag(this)">×</button>`;
    tags.insertBefore(tag,e.target);
    e.target.value='';
  }
}

/* Auto-populate opSelfPay for a doctor's ops from selfPayItems defaults */
function autoPopulateOpSelfPay(docId, ops){
  if(!ops||!ops.length||!selfPayItems.length) return;
  ops.forEach(function(op){
    const key=docId+':'+op;
    if(!opSelfPay[key]){
      // Brand new op: copy all default items in (required=[],optional=[all items])
      opSelfPay[key]={
        required:[],
        optional:selfPayItems.map(function(it){return it.id;})
      };
      if(window._fbSaveOpSelfPay) window._fbSaveOpSelfPay(key, opSelfPay[key]);
    }
  });
}

let selfPayItems = [];

let opSelfPay = {};


/* ── EDIT BOOKING SELFPAY PAGE ── */
window.openEditSelfPayPage = function(bookingId){
  const b=bookings.find(x=>x.id===bookingId);
  if(!b)return;
  const key=(b.docId&&b.op)?(b.docId+':'+b.op):null;
  const cfg=key&&opSelfPay[key]?opSelfPay[key]:{required:[],optional:[]};
  const reqItems=selfPayItems.filter(it=>cfg.required.includes(it.id));
  const optItems=selfPayItems.filter(it=>cfg.optional.includes(it.id));
  // fallback: show all as optional
  const optDisplay=optItems.length?optItems:(selfPayItems.length?selfPayItems:[]);
  const curSel=b.selfPayItems||[];

  document.getElementById('modalTitle').textContent='修改自費項目';
  let html='<div id="esp_wrap">';

  // Optional items - table style with checkbox
  if(optDisplay.length){
    html+='<div style="font-size:11px;font-weight:700;color:var(--text2);margin-bottom:8px;">選填項目</div>';
    html+='<table style="width:100%;border-collapse:collapse;margin-bottom:12px;">';
    html+='<thead><tr style="background:#F8FAFC;"><th style="padding:7px 10px;text-align:left;border:1px solid var(--border);font-size:12px;">項目</th><th style="padding:7px 10px;text-align:center;border:1px solid var(--border);font-size:12px;width:70px;">數量</th><th style="padding:7px 10px;text-align:right;border:1px solid var(--border);font-size:12px;width:80px;">小計</th></tr></thead><tbody>';
    optDisplay.forEach(it=>{
      const ex=curSel.find(s=>s.id===it.id&&s.role!=='required');
      const checked=!!ex; const qty=ex?ex.qty:1;
      const priceStr=it.unit?`$${it.price}/${it.unit}`:`$${it.price}`;
      const subtotal=checked?parseInt(it.price)*qty:0;
      html+=`<tr id="espr_${it.id}" style="cursor:pointer;" onclick="toggleEspItem('${it.id}')">
        <td style="padding:7px 10px;border:1px solid var(--border);">
          <div style="display:flex;align-items:center;gap:8px;">
            <div class="sp-round-cb${checked?' chk':''}" id="espcb_${it.id}" style="width:18px;height:18px;border-radius:50%;border:2px solid var(--border);background:${checked?'var(--orange)':'white'};flex-shrink:0;display:flex;align-items:center;justify-content:center;">
              ${checked?'<svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3" stroke-linecap="round" style="width:10px;height:10px;"><polyline points="20 6 9 17 4 12"/></svg>':''}
            </div>
            <span style="font-size:13px;font-weight:600;">${it.name}</span>
            <span style="font-size:11px;color:var(--text2);">${priceStr}</span>
          </div>
        </td>
        <td style="padding:7px 10px;border:1px solid var(--border);text-align:center;" onclick="event.stopPropagation()">
          <input type="number" id="espq_${it.id}" value="${qty}" min="1" max="99" style="width:52px;text-align:center;padding:4px 6px;border:1.5px solid var(--border);border-radius:var(--rx);font-size:13px;outline:none;display:${checked?'block':'none'};margin:0 auto;" oninput="updateEspSubtotal('${it.id}')">
        </td>
        <td style="padding:7px 10px;border:1px solid var(--border);text-align:right;font-weight:700;font-size:13px;" id="espsub_${it.id}">${checked?'$'+subtotal.toLocaleString():'—'}</td>
      </tr>`;
    });
    html+='</tbody></table>';
  }

  // Required items - fixed text
  if(reqItems.length){
    html+='<div style="border-top:1px solid var(--border);padding-top:10px;margin-bottom:10px;">';
    html+='<div style="font-size:11px;font-weight:700;color:var(--text2);margin-bottom:8px;">必要費用（固定）</div>';
    reqItems.forEach(it=>{
      html+=`<div style="display:flex;justify-content:space-between;padding:5px 0;font-size:13px;border-bottom:1px solid #F1F5F9;"><span style="font-weight:600;">${it.name}</span><span style="font-weight:700;">$${it.price.toLocaleString()}</span></div>`;
    });
    html+='</div>';
  }

  // Total
  html+=`<div style="border-top:1.5px solid var(--border);padding-top:8px;display:flex;justify-content:space-between;font-size:14px;font-weight:700;">
    <span>合計</span><span style="color:var(--orange);" id="esp_total">$0</span>
  </div>`;
  html+='</div>';
  document.getElementById('modalBody').innerHTML=html;
  document.getElementById('modalFoot').innerHTML=`<div class="modal-acts">
    <button class="mbtn mbtn-approve" onclick="confirmEditSelfPay('${bookingId}')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="20 6 9 17 4 12"/></svg>確認</button>
    <button class="mbtn mbtn-close" onclick="_renderDetailModal(bookings.find(x=>x.id==='${bookingId}'),true,false)">取消</button>
  </div>`;
  // init total
  recalcEspTotal('${bookingId}');
};

window.toggleEspItem = function(id){
  const cb=document.getElementById('espcb_'+id);
  const qInp=document.getElementById('espq_'+id);
  const subEl=document.getElementById('espsub_'+id);
  const row=document.getElementById('espr_'+id);
  if(!cb)return;
  const nowChk=cb.innerHTML.includes('polyline')?false:true; // toggle
  if(nowChk){
    cb.style.background='var(--orange)';cb.style.borderColor='var(--orange)';
    cb.innerHTML='<svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3" stroke-linecap="round" style="width:10px;height:10px;"><polyline points="20 6 9 17 4 12"/></svg>';
    if(qInp){qInp.style.display='block';}
  } else {
    cb.style.background='white';cb.style.borderColor='var(--border)';cb.innerHTML='';
    if(qInp){qInp.style.display='none';}
    if(subEl) subEl.textContent='—';
  }
  // update subtotal
  const it=selfPayItems.find(x=>x.id===id);
  if(nowChk&&it&&subEl){
    const q=parseInt(qInp?.value||1)||1;
    subEl.textContent='$'+(it.price*q).toLocaleString();
  }
  recalcEspTotal(null);
};

window.updateEspSubtotal = function(id){
  const it=selfPayItems.find(x=>x.id===id);
  const cb=document.getElementById('espcb_'+id);
  const subEl=document.getElementById('espsub_'+id);
  if(!it||!cb||!subEl)return;
  const checked=cb.innerHTML.includes('polyline');
  if(checked){
    const q=Math.max(1,parseInt(document.getElementById('espq_'+id)?.value||1)||1);
    subEl.textContent='$'+(it.price*q).toLocaleString();
    recalcEspTotal(null);
  }
};

function recalcEspTotal(_bookingId){
  let total=0;
  selfPayItems.forEach(it=>{
    const cb=document.getElementById('espcb_'+it.id);
    if(cb&&cb.innerHTML.includes('polyline')){
      const q=Math.max(1,parseInt(document.getElementById('espq_'+it.id)?.value||1)||1);
      total+=it.price*q;
    }
  });
  // add required
  const curId=document.getElementById('esp_total')?.dataset?.bookingId;
  const b=bookings.find(x=>x.id===_bookingId||x.id===curId);
  if(b){
    const key=(b.docId&&b.op)?(b.docId+':'+b.op):null;
    const cfg=key&&opSelfPay[key]?opSelfPay[key]:{required:[],optional:[]};
    cfg.required.forEach(rid=>{const it=selfPayItems.find(x=>x.id===rid);if(it)total+=it.price;});
  }
  const el=document.getElementById('esp_total');
  if(el) el.textContent='$'+total.toLocaleString();
}

window.confirmEditSelfPay = function(bookingId){
  const b=bookings.find(x=>x.id===bookingId);if(!b)return;
  const items=[];
  // optional selected
  selfPayItems.forEach(it=>{
    const cb=document.getElementById('espcb_'+it.id);
    if(cb&&cb.innerHTML.includes('polyline')){
      const q=Math.max(1,parseInt(document.getElementById('espq_'+it.id)?.value||1)||1);
      items.push({id:it.id,name:it.name,price:it.price,unit:it.unit||'',qty:q,role:'optional'});
    }
  });
  // required
  const key=(b.docId&&b.op)?(b.docId+':'+b.op):null;
  const cfg=key&&opSelfPay[key]?opSelfPay[key]:{required:[],optional:[]};
  cfg.required.forEach(rid=>{
    const it=selfPayItems.find(x=>x.id===rid);
    if(it) items.push({id:it.id,name:it.name,price:it.price,unit:it.unit||'',qty:1,role:'required'});
  });
  b.selfPayItems=items;
  // go back to edit page
  _renderDetailModal(b,true,false);
  toast('success','自費項目已更新，儲存後生效');
};

  renderSpDocTabs();

  }
  const dc=docColor(d.id);

      ...cfg.required.map(id=>{const it=selfPayItems.find(x=>x.id===id)||customItems.find(x=>x.id===id);return it?{...it,role:'required'}:null;}).filter(Boolean),
      ...cfg.optional.map(id=>{const it=selfPayItems.find(x=>x.id===id)||customItems.find(x=>x.id===id);return it?{...it,role:'optional'}:null;}).filter(Boolean),
      ...customItems.filter(it=>!cfg.required.includes(it.id)&&!cfg.optional.includes(it.id)).map(it=>({...it,role:'optional'})),
    ];
    html+=`<div style="border:1px solid ${dc.border};border-radius:var(--r);margin-bottom:14px;overflow:hidden;">
      <div style="display:flex;align-items:center;justify-content:space-between;padding:10px 16px;background:${dc.bg};border-bottom:1px solid ${dc.border};">

        </button>

      html+='<span style="font-size:12px;color:var(--text3);">尚未設定自費項目</span>';
    } else {
      allOpItems.forEach(it=>{
        const priceStr=it.unit?`$${it.price}/${it.unit}`:`$${it.price}`;

        html+=`<div style="display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid #F1F5F9;font-size:13px;">

window.setOpSpRoleInline = function(key, itemId, role){
  if(!opSelfPay[key]) opSelfPay[key]={required:[],optional:[],customItems:[]};
  const cfg=opSelfPay[key];
  cfg.required=cfg.required.filter(x=>x!==itemId);
  cfg.optional=cfg.optional.filter(x=>x!==itemId);
  if(role==='required') cfg.required.push(itemId);
  else cfg.optional.push(itemId);
};

window.removeOpItem = function(key, itemId, isCustom){
  if(!opSelfPay[key]) return;
  const cfg=opSelfPay[key];
  cfg.required=cfg.required.filter(x=>x!==itemId);
  cfg.optional=cfg.optional.filter(x=>x!==itemId);
  if(isCustom) cfg.customItems=(cfg.customItems||[]).filter(x=>x.id!==itemId);
  // re-render editor body
  const edBody=document.getElementById('op_editor_body');
  if(edBody) window.openOpSelfPayEditor._lastRender&&window.openOpSelfPayEditor._lastRender();
  renderOpSelfPaySettings();
};

window.addDefaultOpItem = function(key){
  const sel=document.getElementById('op_add_default_sel');
  const role=document.getElementById('op_add_default_role').value;
  if(!sel||!sel.value){toast('warn','請選擇項目');return;}
  if(!opSelfPay[key]) opSelfPay[key]={required:[],optional:[],customItems:[]};
  const cfg=opSelfPay[key];
  cfg.required=cfg.required.filter(x=>x!==sel.value);
  cfg.optional=cfg.optional.filter(x=>x!==sel.value);
  if(role==='required') cfg.required.push(sel.value);
  else cfg.optional.push(sel.value);
  renderOpSelfPaySettings();
  // re-open editor to refresh
  const parts=key.split(':'); const docId=parseInt(parts[0]); const opN=parts.slice(1).join(':');
  window.openOpSelfPayEditor(docId,opN);
};

window.addCustomOpItem = function(key){
  const name=document.getElementById('op_ci_name')?.value.trim();
  const price=parseInt(document.getElementById('op_ci_price')?.value)||0;
  const unit=document.getElementById('op_ci_unit')?.value.trim()||'';
  const role=document.getElementById('op_ci_role')?.value||'optional';
  if(!name){toast('warn','請輸入項目名稱');return;}
  if(!price){toast('warn','請輸入單價');return;}
  if(!opSelfPay[key]) opSelfPay[key]={required:[],optional:[],customItems:[]};
  const cfg=opSelfPay[key];
  const newId='ci_'+Date.now();
  if(!cfg.customItems) cfg.customItems=[];
  cfg.customItems.push({id:newId,name,price,unit});
  if(role==='required') cfg.required.push(newId);
  else cfg.optional.push(newId);
  renderOpSelfPaySettings();
  const parts=key.split(':'); const docId=parseInt(parts[0]); const opN=parts.slice(1).join(':');
  window.openOpSelfPayEditor(docId,opN);
};

window.saveOpSelfPay = function(key){

};

window.openAddSelfPay = function(){
  document.getElementById('modalTitle').textContent='新增自費項目';
  document.getElementById('modal').className='modal';
  selfPayModal(null);
  document.getElementById('modalFoot').innerHTML=`<div class="modal-acts">

    <button class="mbtn mbtn-close" onclick="closeModal()">取消</button>
  </div>`;

}

window.saveAddSelfPay = function(){
  const name=document.getElementById('sp_name').value.trim();
  const price=document.getElementById('sp_price').value;
  const unit=document.getElementById('sp_unit').value.trim();
  if(!name){toast('err','請輸入項目名稱');return;}
  if(!price||isNaN(parseInt(price))){toast('err','請輸入有效單價');return;}
  // unit is optional
  const newId='sp'+Date.now();
  selfPayItems.push({id:newId,name,price:parseInt(price),unit});
  closeModal();renderSelfPay();renderOpSelfPaySettings();toast('success','自費項目已新增，請按「儲存自費項目」同步');
}

window.openEditSelfPay = function(id){
  const item=selfPayItems.find(x=>x.id===id);if(!item)return;
  document.getElementById('modalTitle').textContent='編輯自費項目';
  document.getElementById('modal').className='modal';
  selfPayModal(item);
  document.getElementById('modalFoot').innerHTML=`<div class="modal-acts">
    <button class="mbtn mbtn-approve" onclick="saveEditSelfPay('${id}')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="20 6 9 17 4 12"/></svg>儲存</button>
    <button class="mbtn mbtn-close" onclick="closeModal()">取消</button>
  </div>`;
  openOverlay();
}

window.saveEditSelfPay = function(id){
  const item=selfPayItems.find(x=>x.id===id);if(!item)return;
  item.name=document.getElementById('sp_name').value.trim()||item.name;
  item.price=parseInt(document.getElementById('sp_price').value)||item.price;
  item.unit=document.getElementById('sp_unit').value.trim()||item.unit;
  closeModal();renderSelfPay();renderOpSelfPaySettings();toast('success','已更新');
}

window.deleteSelfPay = function(id){
  const item=selfPayItems.find(x=>x.id===id);if(!item)return;
  if(!confirm('確定刪除「'+item.name+'」？'))return;
  selfPayItems=selfPayItems.filter(x=>x.id!==id);
  renderSelfPay();toast('warn','已刪除');
}

window.saveSelfPayToDB = function(){
  if(window._fbSaveSelfPay) window._fbSaveSelfPay(selfPayItems);
  else toast('warn','Firebase 尚未連線');
}

window._pendingSelfPayItems = [];

window.openSelfPayPicker = function(){
  if(!selfPayItems.length){toast('warn','尚未設定自費項目，請先至「自費項目」分頁新增');return;}
  const existing=window._pendingSelfPayItems||[];
  document.getElementById('modal2Title').textContent='選擇自費項目';
  let listHTML='<div style="font-size:12px;color:var(--text2);margin-bottom:12px;">勾選後輸入數量，未勾選的項目不會加入。</div>';
  selfPayItems.forEach(it=>{
    const ex=existing.find(e=>e.id===it.id);
    const checked=!!ex; const qty=ex?ex.qty:1;
    const priceStr=it.unit?`$${it.price}/${it.unit}`:`$${it.price}`;
    listHTML+=`<div class="sp-check-item${checked?' sel':''}" id="sppi_${it.id}" onclick="toggleSpPickItem('${it.id}')">
      <div class="sp-round-cb${checked?' chk':''}" id="spcb_${it.id}"></div>
      <div class="sp-check-name">${it.name}</div>
      <div class="sp-check-unit">${priceStr}</div>
      <input type="number" class="sp-qty" id="sppq_${it.id}" value="${qty}" min="1" max="999" onclick="event.stopPropagation()">
    </div>`;
  });
  // Force modal2 to be same width as main modal
  document.getElementById('modal2').style.width='540px';
  document.getElementById('modal2Body').innerHTML=listHTML;
  document.getElementById('modal2Foot').innerHTML=`<div class="modal-acts">
    <button class="mbtn mbtn-approve" onclick="confirmSpPicker()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="20 6 9 17 4 12"/></svg>確認</button>
    <button class="mbtn mbtn-close" onclick="closeModal2()">取消</button>
  </div>`;
  openOverlay2();
}

window.toggleSpPickItem = function(id){
  const row=document.getElementById('sppi_'+id);
  const cb=document.getElementById('spcb_'+id);
  if(!row||!cb)return;
  const isNowChecked=!cb.classList.contains('chk');
  cb.classList.toggle('chk',isNowChecked);
  row.classList.toggle('sel',isNowChecked);
};

window.confirmSpPicker = function(){
  const items=[];
  selfPayItems.forEach(it=>{
    const cb=document.getElementById('spcb_'+it.id);
    if(cb&&cb.classList.contains('chk')){
      const qtyEl=document.getElementById('sppq_'+it.id);
      const qty=Math.max(1,parseInt(qtyEl?qtyEl.value:1)||1);
      items.push({id:it.id,name:it.name,price:it.price,unit:it.unit,qty});
    }
  });
  window._pendingSelfPayItems=items;
  const preview=document.getElementById('a_selfpay_preview');
  if(preview){
    if(items.length){
      const total=items.reduce((s,x)=>s+x.price*x.qty,0);
      let html='<div style="background:var(--op);border:1px solid var(--ob);border-radius:var(--rx);padding:10px 12px;">';
      items.forEach(x=>{ html+=`<div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px;"><span>${x.name} x ${x.qty}</span><span style="font-weight:700;">$${(x.price*x.qty).toLocaleString()}</span></div>`; });
      html+=`<div style="border-top:1px solid var(--ob);margin-top:6px;padding-top:6px;display:flex;justify-content:space-between;font-size:13px;font-weight:700;"><span>合計</span><span style="color:var(--orange);">$${total.toLocaleString()}</span></div></div>`;
      preview.innerHTML=html;
    } else { preview.innerHTML=''; }
  }
  closeModal2();
  toast('success',items.length?('已選擇 '+items.length+' 項自費項目'):'已清除自費項目');
}

  *{box-sizing:border-box;margin:0;padding:0;}

  .doc{font-family:'Noto Sans TC',sans-serif;font-size:14px;color:#000;line-height:1.7;max-width:680px;margin:0 auto;}
  .hd{text-align:center;margin-bottom:0;}
  .hd-clinic{font-size:20px;font-weight:900;letter-spacing:.05em;}
  .hd-doc{font-size:14px;font-weight:600;letter-spacing:.18em;margin-top:6px;color:#222;}
  .hd-rule{border:none;border-top:1.5px solid #000;margin:14px 0 18px;}
  .two-col{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px;}
  .card-sec{border:1px solid #000;border-radius:4px;overflow:hidden;margin-bottom:12px;}
  .sec-ttl{padding:6px 14px;font-size:14px;font-weight:700;border-bottom:1px solid #000;background:#F2F2F2;letter-spacing:.04em;}
  .sec-body{padding:10px 14px;}
  .row{display:flex;padding:5px 0;border-bottom:1px solid #EFEFEF;font-size:14px;}
  .row:last-child{border-bottom:none;}
  .k{color:#555;width:72px;flex-shrink:0;}
  .v{font-weight:600;flex:1;}
  .sp-table{width:100%;border-collapse:collapse;font-size:14px;}
  .sp-table th{padding:7px 12px;text-align:left;background:#F2F2F2;border:1px solid #000;font-weight:700;}
  .sp-table th.r{text-align:right;}
  .sp-table td{padding:7px 12px;border:1px solid #CCC;}
  .sp-table td.r{text-align:right;}
  .sp-table td.n{font-weight:600;}
  .sp-table tfoot td{border:1px solid #000;font-weight:900;font-size:15px;}
  .sig-note{font-size:14px;margin:20px 0 18px;line-height:1.75;}
  .sig-fields{display:flex;gap:28px;margin-top:4px;}
  .sig-f{flex:2;}
  .sig-d{flex:1;}
  .sig-line{border-bottom:1.5px solid #000;height:38px;}
  .sig-lbl{font-size:14px;color:#666;margin-top:4px;}
  .ft{margin-top:16px;font-size:14px;color:#888;text-align:center;}
  @page{size:A4;margin:24mm 22mm 20mm;}
  @media print{body{-webkit-print-color-adjust:exact;print-color-adjust:exact;}}
`;

    </div>

    <div class="two-col">
      <div class="card-sec">
        <div class="sec-ttl">病人資料</div>
        <div class="sec-body">
          <div class="row"><span class="k">姓名</span><span class="v">${b.name}</span></div>
          <div class="row"><span class="k">生日</span><span class="v">${fmtBday(b.bday)||'—'}</span></div>
          <div class="row"><span class="k">聯絡電話</span><span class="v">${b.phone}</span></div>

          <div class="row"><span class="k">手術日期</span><span class="v">${fmtDate(b.date)}</span></div>
          <div class="row"><span class="k">手術時段</span><span class="v">${b.slot}</span></div>

}

function buildSpPrintBlock(b){
  if(!b.selfPayItems||!b.selfPayItems.length) return '';
  const total=b.selfPayItems.reduce(function(s,it){return s+parseInt(it.price)*parseInt(it.qty);},0);
  let rows='';
  b.selfPayItems.forEach(function(it){
    const sub=(parseInt(it.price)*parseInt(it.qty)).toLocaleString();
    rows+=`<tr><td class="n">${it.name}</td><td style="text-align:center;border:1px solid #CCC;padding:7px 12px;">${it.qty}</td><td class="r">$${sub}</td></tr>`;
  });
  return `<table class="sp-table">
    <thead><tr>
      <th>項目名稱</th>
      <th style="text-align:center;border:1px solid #000;padding:7px 12px;">數量</th>
      <th class="r">小計</th>
    </tr></thead>
    <tbody>${rows}</tbody>
    <tfoot><tr>
      <td colspan="2" style="text-align:right;padding:7px 12px;border:1px solid #000;">合計</td>
      <td class="r" style="padding:7px 12px;border:1px solid #000;">$${total.toLocaleString()}</td>
    </tr></tfoot>
  </table>`;
}

window.printBookingDetail = function(id){
  const b=bookings.find(function(x){return x.id===id;});
  if(!b) return;
  doPrint(buildBookingPrintHTML(b));
}

window.printCalendar = function(){
  // Only called in day view — filter approved, sorted by slot
  // Fix timezone bug: use local date not UTC
  const ds=`${calDate.getFullYear()}-${String(calDate.getMonth()+1).padStart(2,'0')}-${String(calDate.getDate()).padStart(2,'0')}`;
  let filtered=bookings.filter(function(b){
    return b.date===ds && b.status==='approved';
  });
  if(calDocFilter!=='all'){
    const cdf=typeof calDocFilter==='string'?parseInt(calDocFilter):calDocFilter;
    filtered=filtered.filter(function(b){return b.docId===cdf;});
  }
  if(!filtered.length){toast('warn','當日沒有已核准的預約');return;}
  filtered.sort(function(a,b2){return a.slot.localeCompare(b2.slot);});
  let pages='';
  filtered.forEach(function(b,i){
    const isLast=(i===filtered.length-1);
    pages+=`<div style="${isLast?'':'page-break-after:always;'}padding:28px 22px;">${buildBookingPrintHTML(b)}</div>`;
  });
  doPrint(pages);
}

function doPrint(html){
  const pa=document.getElementById('printArea');
  pa.innerHTML=`<style>${PRINT_CSS}</style>`+html;
  pa.style.display='block';
  window.print();
  setTimeout(function(){pa.style.display='none';pa.innerHTML='';},1200);
}
