<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>樂霖後台管理系統</title>
<!-- Firebase compat SDK 提前載入，確保所有功能正常運作 -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.2/Sortable.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;600;700;900&display=swap');
:root {
  --orange:#F47B20; --ol:#FFA855; --op:#FFF4EB; --ob:#FFD4A8;
  --white:#fff; --bg:#F4F6F9; --sb:#1C2333; --sbh:#273047;
  --text:#1A1A2E; --text2:#64748B; --text3:#B0B8C8;
  --border:#E2E8F0; --card:#fff;
  --green:#22C55E; --gp:#F0FDF4; --gb:#BBF7D0;
  --red:#EF4444; --rp:#FEF2F2; --rb:#FECACA;
  --yellow:#F59E0B; --yp:#FFFBEB; --yb:#FDE68A;
  --blue:#3B82F6; --bp:#EFF6FF; --bb:#BFDBFE;
  --line:#06C755;
  --r:12px; --rs:8px; --rx:6px;
  --sh:0 1px 3px rgba(0,0,0,.08),0 4px 12px rgba(0,0,0,.04);
  --shm:0 4px 20px rgba(0,0,0,.12);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Noto Sans TC',sans-serif;background:var(--bg);color:var(--text);display:flex;min-height:100vh;font-size:14px;}
button{font-family:inherit;cursor:pointer;}

/* ── SIDEBAR ── */
.sb{width:210px;background:var(--sb);display:flex;flex-direction:column;flex-shrink:0;position:fixed;top:0;left:0;height:100vh;z-index:200;}
.sb-logo{padding:20px 16px 16px;border-bottom:1px solid rgba(255,255,255,.08);}
.sb-logo-row{display:flex;align-items:center;gap:10px;margin-bottom:6px;}
.sb-icon{width:34px;height:34px;border-radius:10px;background:linear-gradient(135deg,var(--orange),var(--ol));display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.sb-icon svg{width:18px;height:18px;}
.sb-name{font-size:12.5px;font-weight:700;color:#fff;line-height:1.3;}
.sb-sub{font-size:9.5px;color:rgba(255,255,255,.4);}
.sb-badge{display:inline-block;background:rgba(244,123,32,.22);color:var(--ol);font-size:9px;font-weight:700;padding:2px 8px;border-radius:10px;letter-spacing:.06em;}
.sb-nav{padding:14px 10px;flex:1;overflow-y:auto;}
.sb-sec{font-size:9px;color:rgba(255,255,255,.28);font-weight:700;letter-spacing:.12em;padding:0 8px;margin-bottom:5px;margin-top:14px;}
.sb-sec:first-child{margin-top:0;}
.ni{display:flex;align-items:center;gap:9px;padding:8px 10px;border-radius:var(--rx);cursor:pointer;color:rgba(255,255,255,.5);font-size:12.5px;font-weight:500;transition:all .16s;margin-bottom:1px;border:none;background:none;width:100%;}
.ni svg{width:15px;height:15px;flex-shrink:0;}
.ni:hover{background:var(--sbh);color:rgba(255,255,255,.88);}
.ni.active{background:rgba(244,123,32,.18);color:var(--ol);font-weight:600;}

/* ── TOPBAR ── */
.main{margin-left:210px;flex:1;display:flex;flex-direction:column;min-height:100vh;}
.topbar{background:var(--white);border-bottom:1px solid var(--border);padding:0 24px;height:54px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;}
.topbar-title{font-size:15px;font-weight:700;color:var(--text);}
.tb-btn{display:flex;align-items:center;gap:6px;padding:7px 14px;border-radius:var(--rx);border:1.5px solid var(--border);background:var(--white);color:var(--text2);font-size:12.5px;font-weight:600;cursor:pointer;transition:all .15s;}
.tb-btn:hover{border-color:var(--orange);color:var(--orange);}
.tb-btn.primary{background:var(--orange);border-color:var(--orange);color:white;}
.tb-btn.primary:hover{background:var(--ol);border-color:var(--ol);}
.tb-btn svg{width:14px;height:14px;}

.content{padding:22px 24px;flex:1;}
.panel{display:none;}.panel.active{display:block;}

/* ── CARDS / TABLES ── */
.card{background:var(--card);border-radius:var(--r);border:1px solid var(--border);box-shadow:var(--sh);}
.sec-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
.sec-hd h2{font-size:14.5px;font-weight:700;}
.sec-hd-acts{display:flex;gap:8px;}

.tbl-wrap{background:var(--card);border-radius:var(--r);border:1px solid var(--border);box-shadow:var(--sh);overflow:hidden;}
.tbl-filters{padding:12px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;flex-wrap:wrap;flex:1;}
.ft{padding:5px 12px;border-radius:20px;font-size:12px;font-weight:600;cursor:pointer;border:1.5px solid var(--border);background:var(--white);color:var(--text2);transition:all .15s;}
.ft.active{border-color:var(--orange);background:var(--op);color:var(--orange);}

/* sortable column headers */
th.sortable{cursor:pointer;user-select:none;}
th.sortable:hover{color:var(--orange);}
th.sortable .sort-icon{display:inline-block;margin-left:4px;opacity:.4;font-size:10px;}
th.sortable.asc .sort-icon::after{content:'↑';}
th.sortable.desc .sort-icon::after{content:'↓';}
th.sortable:not(.asc):not(.desc) .sort-icon::after{content:'↕';}
th.sortable.asc .sort-icon,th.sortable.desc .sort-icon{opacity:1;color:var(--orange);}

/* global time settings */
.global-time-modal .modal-body{padding-bottom:0;}
.global-slots-wrap{display:flex;flex-direction:column;gap:8px;}
.global-slot-row{display:flex;align-items:center;gap:8px;padding:8px 12px;background:#F8FAFC;border-radius:var(--rx);border:1px solid var(--border);}
.global-slot-time{font-size:13px;font-weight:700;color:var(--text);flex:1;}
.global-slot-del{width:24px;height:24px;border-radius:50%;border:none;background:var(--rp);color:var(--red);display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;}
.global-slot-del svg{width:11px;height:11px;}
.global-slot-add{display:flex;gap:8px;margin-top:6px;}
.global-slot-add input{flex:1;padding:8px 12px;border:1.5px solid var(--border);border-radius:var(--rx);font-family:inherit;font-size:13px;outline:none;}
.global-slot-add input:focus{border-color:var(--orange);}
.global-slot-add-btn{padding:8px 14px;background:var(--orange);color:white;border:none;border-radius:var(--rx);font-size:13px;font-weight:700;cursor:pointer;}

/* day detail modal */
.day-detail-slots{display:flex;flex-direction:column;gap:6px;}
.dds-item{display:flex;align-items:center;gap:8px;padding:8px 12px;background:#F8FAFC;border-radius:var(--rx);border:1px solid var(--border);}
.dds-time{font-size:13px;font-weight:700;flex:1;}
.dds-booked{font-size:11px;color:var(--text3);background:var(--border);padding:2px 8px;border-radius:10px;}
.dds-del{width:24px;height:24px;border-radius:50%;border:none;background:var(--rp);color:var(--red);display:flex;align-items:center;justify-content:center;cursor:pointer;}
.dds-del svg{width:11px;height:11px;}
.dds-add-row{display:flex;gap:8px;margin-top:8px;}
.dds-add-inp{flex:1;padding:8px 12px;border:1.5px solid var(--border);border-radius:var(--rx);font-family:inherit;font-size:13px;outline:none;}
.dds-add-inp:focus{border-color:var(--orange);}
.dds-add-btn{padding:8px 14px;background:var(--orange);color:white;border:none;border-radius:var(--rx);font-size:13px;font-weight:700;cursor:pointer;}

/* ops card list */
.ops-list{display:flex;flex-direction:column;border:1.5px solid var(--border);border-radius:var(--rx);overflow:hidden;}
.ops-item{display:flex;align-items:center;padding:8px 12px;border-bottom:1px solid var(--border);gap:8px;transition:background .12s;}
.ops-item:last-child{border-bottom:none;}
.ops-item:hover{background:#F8FAFC;}
.ops-item.editing{background:#FFFBF7;cursor:default;}
.ops-item-left{flex:1;min-width:0;cursor:pointer;}
.ops-item-name{font-size:13px;font-weight:600;color:var(--text);}
.ops-item-desc{font-size:11px;color:var(--text3);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.ops-item-edit-wrap{display:flex;flex-direction:column;gap:5px;flex:1;}
.ops-item-inp{padding:5px 9px;border:1.5px solid var(--border);border-radius:var(--rx);font-family:inherit;font-size:12px;outline:none;width:100%;}
.ops-item-inp:focus{border-color:var(--orange);}
.ops-item-acts{display:flex;gap:5px;flex-shrink:0;}
.ops-add-btn{display:flex;align-items:center;gap:5px;padding:8px 12px;font-size:12px;font-weight:600;color:var(--text2);background:none;border:none;cursor:pointer;width:100%;transition:color .12s;}
.ops-add-btn:hover{color:var(--orange);}
.ops-add-row{display:flex;flex-direction:column;gap:5px;padding:8px 12px;border-top:1px solid var(--border);background:#FFFBF7;}
.ops-add-row-acts{display:flex;gap:5px;margin-top:2px;}

/* ── DOCTOR TABS (schedule) ── */
.doc-tabs{display:flex;gap:0;border-bottom:2px solid var(--border);margin-bottom:20px;overflow-x:auto;scrollbar-width:none;}
.doc-tabs::-webkit-scrollbar{display:none;}
.doc-tab{padding:8px 18px;font-size:12.5px;font-weight:600;color:var(--text2);cursor:pointer;border:none;background:none;border-bottom-width:4px;border-bottom-style:solid;border-bottom-color:transparent;margin-bottom:-2px;white-space:nowrap;transition:all .15s;position:relative;}
.doc-tab:hover{color:var(--orange);}
.doc-tab.active{font-weight:700;border-bottom-color:currentColor;}



/* slot summary (v2 style restored) */
.slot-summary{margin-top:18px;}
.slot-summary-title{font-size:12px;font-weight:700;color:var(--text2);margin-bottom:10px;}
.slot-summary-item{display:flex;align-items:center;gap:10px;padding:8px 12px;background:var(--white);border-radius:var(--rx);border:1px solid var(--border);margin-bottom:6px;}
.slot-summary-date{font-size:13px;font-weight:700;color:var(--text);min-width:90px;}
.slot-summary-chips{display:flex;gap:5px;flex-wrap:wrap;flex:1;}
.slot-summary-chip{font-size:11px;font-weight:600;padding:2px 8px;border-radius:10px;background:var(--op);color:var(--orange);border:1px solid var(--ob);}
.slot-summary-chip.booked{background:#F1F5F9;color:var(--text3);border-color:var(--border);}
.slot-summary-del{width:22px;height:22px;border-radius:50%;border:none;background:var(--rp);color:var(--red);display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;}
.slot-summary-del svg{width:11px;height:11px;}

/* day-slot add row */
.dds-add-row{display:flex;gap:6px;margin-top:10px;align-items:center;}
.dds-select{padding:7px 10px;border:1.5px solid var(--border);border-radius:var(--rx);font-family:inherit;font-size:13px;outline:none;background:white;}
.dds-select:focus{border-color:var(--orange);}
.dds-add-btn{padding:7px 14px;background:var(--orange);color:white;border:none;border-radius:var(--rx);font-size:13px;font-weight:700;cursor:pointer;}

.search-inp{padding:6px 11px;border-radius:var(--rx);border:1.5px solid var(--border);font-family:inherit;font-size:12px;color:var(--text);outline:none;width:160px;}
.search-inp:focus{border-color:var(--orange);}
table{width:100%;border-collapse:collapse;}
thead tr{background:#F8FAFC;border-bottom:1px solid var(--border);}
th{padding:9px 14px;font-size:11px;font-weight:700;color:var(--text2);text-align:left;letter-spacing:.04em;white-space:nowrap;}
td{padding:10px 14px;font-size:13px;border-bottom:1px solid #F1F5F9;vertical-align:middle;}
tr:last-child td{border-bottom:none;}
tr:hover td{background:#C3D9EE;}
.detail-card tr:hover td{background:transparent;}
.detail-card tr[style*="background:var(--yp)"]:hover td{background:var(--yp);}
.selfpay-tbl tr:hover td{background:transparent !important;}
.selfpay-tbl tr.retired-row:hover td{background:var(--yp) !important;}
.td-name{font-weight:600;}
.td-date{color:var(--text2);font-size:12px;}
.td-slot{font-weight:700;color:var(--orange);font-size:12px;}

/* BADGES */
.badge{display:inline-flex;align-items:center;gap:3px;padding:3px 8px;border-radius:20px;font-size:11px;font-weight:700;white-space:nowrap;}
.b-pending{background:var(--yp);color:#92400E;border:1px solid var(--yb);}
.b-approved{background:var(--gp);color:#15803D;border:1px solid var(--gb);}
.b-notified{background:var(--bp);color:#1D4ED8;border:1px solid var(--bb);}
.b-rejected{background:var(--rp);color:#DC2626;border:1px solid var(--rb);}

/* ICON BTNS */
.icon-btn{width:30px;height:30px;border-radius:var(--rx);border:1.5px solid;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .15s;flex-shrink:0;}
.icon-btn svg{width:13px;height:13px;}
.ib-approve{border-color:var(--gb);color:#15803D;background:var(--gp);}
.ib-approve:hover{background:#DCFCE7;}
.ib-reject{border-color:var(--rb);color:#DC2626;background:var(--rp);}
.ib-reject:hover{background:#FEE2E2;}
.ib-line{border-color:#A7F3D0;color:var(--line);background:#F0FDF4;}
.ib-line:hover{background:#DCFCE7;}
.ib-line-undo{border-color:var(--border);color:var(--text2);background:var(--white);font-size:10px;}
.ib-line-undo:hover{border-color:var(--red);color:var(--red);}
.ib-edit{border-color:var(--border);color:var(--text2);background:var(--white);}
.ib-edit:hover{border-color:var(--orange);color:var(--orange);}
.ib-del{border-color:var(--rb);color:#DC2626;background:var(--rp);}
.ib-del:hover{background:#FEE2E2;}
.ib-detail{border-color:var(--bb);color:#1D4ED8;background:var(--bp);}
.ib-detail:hover{background:#DBEAFE;}
.act-row{display:flex;gap:5px;align-items:center;}
.ib-done{font-size:11px;color:var(--line);font-weight:700;display:flex;align-items:center;gap:3px;white-space:nowrap;}
.ib-done svg{width:12px;height:12px;}

/* ── SCHEDULE SETTINGS ── */
.slot-picker-wrap{background:var(--card);border-radius:var(--r);border:1px solid var(--border);box-shadow:var(--sh);padding:22px;}
.slot-picker-hd{display:flex;align-items:center;gap:12px;margin-bottom:16px;}
.slot-month-nav{display:flex;align-items:center;gap:8px;}
.slot-mnav-btn{width:30px;height:30px;border-radius:50%;border:1.5px solid var(--border);background:var(--white);color:var(--text2);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .15s;}
.slot-mnav-btn:hover{border-color:var(--orange);color:var(--orange);}
.slot-mnav-btn svg{width:11px;height:11px;}
.slot-month-label{font-size:15px;font-weight:700;min-width:120px;text-align:center;}
.slot-save-btn{margin-left:auto;padding:8px 18px;background:var(--orange);color:white;border:none;border-radius:var(--rx);font-size:13px;font-weight:700;cursor:pointer;transition:all .2s;}
.slot-save-btn:hover{background:var(--ol);}


.time-slot-panel{background:#F8FAFC;border-radius:var(--rs);border:1px solid var(--border);padding:14px 16px;}
.ts-panel-title{font-size:12px;font-weight:700;color:var(--text2);margin-bottom:12px;display:flex;align-items:center;gap:6px;}
.ts-panel-title svg{width:14px;height:14px;color:var(--orange);}
.no-date-hint{text-align:center;padding:28px 0;color:var(--text3);font-size:13px;}

.slot-summary{margin-top:0;}
.slot-summary-title{font-size:12px;font-weight:700;color:var(--text2);margin-bottom:10px;}
.slot-summary-date{font-size:13px;font-weight:700;color:var(--text);min-width:90px;}
.slot-summary-chips{display:flex;gap:5px;flex-wrap:wrap;flex:1;}
.slot-summary-chip{font-size:11px;font-weight:600;padding:2px 8px;border-radius:10px;background:var(--op);color:var(--orange);border:1px solid var(--ob);}
.slot-summary-chip.booked{background:#F1F5F9;color:var(--text3);border-color:var(--border);}
.slot-summary-del{width:22px;height:22px;border-radius:50%;border:none;background:var(--rp);color:var(--red);display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;}
.slot-summary-del svg{width:11px;height:11px;}


/* ── WEEK LIMIT TOGGLE ── */
.wl-toggle-row{display:flex;align-items:center;gap:10px;margin-top:10px;}
.wl-toggle-lbl{font-size:12px;color:var(--text2);font-weight:600;flex:1;}
.wl-toggle{position:relative;width:38px;height:22px;flex-shrink:0;}
.wl-toggle input{opacity:0;width:0;height:0;position:absolute;}
.wl-slider{position:absolute;inset:0;background:var(--border);border-radius:11px;cursor:pointer;transition:background .2s;}
.wl-slider::before{content:'';position:absolute;width:16px;height:16px;left:3px;top:3px;background:white;border-radius:50%;transition:transform .2s;}
.wl-toggle input:checked+.wl-slider{background:var(--orange);}
.wl-toggle input:checked+.wl-slider::before{transform:translateX(16px);}
.wl-days-inp{display:none;align-items:center;gap:6px;margin-top:8px;font-size:12px;color:var(--text2);}
.wl-days-inp.on{display:flex;}
.wl-days-inp input{width:60px;text-align:center;padding:5px 8px;border:1.5px solid var(--border);border-radius:var(--rx);font-family:inherit;font-size:13px;outline:none;}
.wl-days-inp input:focus{border-color:var(--orange);}
/* ── DOCTOR SETTINGS ── */
.doctors-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px;}
.doctor-card{background:var(--card);border-radius:var(--r);border:1px solid var(--border);box-shadow:var(--sh);padding:18px 18px 14px;}
.dc-head{display:flex;align-items:center;gap:10px;margin-bottom:14px;}
.dc-avatar{width:40px;height:40px;border-radius:50%;background:linear-gradient(135deg,var(--orange),var(--ol));display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:700;color:white;flex-shrink:0;}
.dc-name{font-size:14px;font-weight:700;}
.dc-title{font-size:11px;color:var(--text2);margin-top:1px;}
.dc-acts{margin-left:auto;display:flex;gap:6px;}
.dc-ops-label{font-size:11px;font-weight:700;color:var(--text2);margin-bottom:7px;}
.dc-op-chips{display:flex;flex-wrap:wrap;gap:5px;}
.dc-op-chip{font-size:11px;font-weight:600;padding:3px 9px;border-radius:10px;background:#F1F5F9;color:var(--text2);border:1px solid var(--border);}
.dc-op-chip.orange{background:var(--op);color:var(--orange);border-color:var(--ob);}
.add-doctor-btn{display:flex;align-items:center;gap:8px;padding:16px 18px;background:var(--white);border-radius:var(--r);border:2px dashed var(--border);color:var(--text3);font-size:13px;font-weight:600;cursor:pointer;transition:all .2s;width:100%;justify-content:center;}
.add-doctor-btn:hover{border-color:var(--orange);color:var(--orange);}
.add-doctor-btn svg{width:18px;height:18px;}


/* ── ADD PATIENT MINI CALENDAR ── */
.add-cal-wrap{border:1.5px solid var(--border);border-radius:var(--rx);padding:10px 12px;background:white;}
.add-cal-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;}
.add-cal-lbl{font-size:13px;font-weight:700;color:var(--text);}
.add-cal-nb{width:24px;height:24px;border-radius:50%;border:1px solid var(--border);background:white;color:var(--text2);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .12s;}
.add-cal-nb:hover{border-color:var(--orange);color:var(--orange);}
.add-cal-nb svg{width:10px;height:10px;}
.add-cal-hd{display:grid;grid-template-columns:repeat(7,1fr);margin-bottom:3px;}
.add-cal-dow{text-align:center;font-size:9px;font-weight:700;color:var(--text3);padding:2px 0;}
.add-cal-dow:first-child{color:#E05252;}.add-cal-dow:last-child{color:#3B82F6;}
.add-cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;}
.acd{aspect-ratio:1;border-radius:6px;border:1.5px solid transparent;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:11px;font-weight:500;cursor:pointer;transition:all .12s;position:relative;line-height:1;}
.acd.other{opacity:0;pointer-events:none;}
.acd.past{color:var(--text3);cursor:default;opacity:.35;}
.acd.noslot{color:var(--text2);opacity:.6;cursor:default;background:#E8EDF3;}
.acd.has{border-color:var(--ob);background:var(--op);color:var(--orange);font-weight:700;}
.acd.has:hover{background:var(--orange);color:white;border-color:var(--orange);}
.acd.picked{background:var(--orange)!important;color:white!important;border-color:var(--orange)!important;font-weight:700;}
.acd.sun{color:#E05252;}.acd.sat{color:#3B82F6;}
.acd.today-marker{font-weight:700;}
.acd-dot{width:3px;height:3px;border-radius:50%;background:var(--orange);margin-top:1px;}
.acd.full{color:var(--text3);cursor:default;opacity:.55;}
.acd-full-lbl{font-size:7px;font-weight:700;color:var(--text3);line-height:1;}
.acd.picked .acd-dot{background:rgba(255,255,255,.7);}
/* ── CALENDAR ── */
.cal-tb{display:flex;align-items:center;gap:10px;margin-bottom:16px;flex-wrap:wrap;flex:1;}
.cal-mnav{display:flex;align-items:center;gap:6px;}
.cal-nb{width:30px;height:30px;border-radius:50%;border:1.5px solid var(--border);background:var(--white);color:var(--text2);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .15s;}
.cal-nb:hover{border-color:var(--orange);color:var(--orange);}
.cal-nb svg{width:11px;height:11px;}
.cal-ttl{font-size:15px;font-weight:700;min-width:150px;text-align:center;}
.cal-today{padding:5px 12px;border-radius:20px;border:1.5px solid var(--border);background:var(--white);color:var(--text2);font-size:12px;font-weight:600;cursor:pointer;transition:all .15s;}
.cal-today:hover{border-color:var(--orange);color:var(--orange);}
.cal-view-tabs{margin-left:auto;display:flex;background:#F1F5F9;border-radius:var(--rx);padding:3px;}
.cvt{padding:5px 13px;border-radius:calc(var(--rx) - 2px);font-size:12px;font-weight:600;cursor:pointer;color:var(--text2);transition:all .15s;border:none;background:none;}
.cvt.active{background:var(--white);color:var(--orange);box-shadow:0 1px 4px rgba(0,0,0,.1);}

.cal-month-grid{background:var(--card);border-radius:var(--r);border:1px solid var(--border);box-shadow:var(--sh);overflow:hidden;}
.cal-month-head{display:grid;grid-template-columns:repeat(7,1fr);border-bottom:1px solid var(--border);}
.cal-mhd{padding:9px;text-align:center;font-size:11px;font-weight:700;color:var(--text2);}
.cal-mhd:first-child{color:var(--red);}
.cal-mhd:last-child{color:#3B82F6;}
.cal-month-body{display:grid;grid-template-columns:repeat(7,1fr);}
.cal-cell{min-height:72px;border-right:1px solid var(--border);border-bottom:1px solid var(--border);padding:4px 5px;}
.cal-cell:nth-child(7n){border-right:none;}
.cal-cell.other .cal-cell-d{color:var(--text3);opacity:.4;}
.cal-cell.today .cal-cell-d{background:var(--orange);color:white;border-radius:50%;}
.cal-cell.sun .cal-cell-d{color:#E05252;}
.cal-cell.sat .cal-cell-d{color:#3B82F6;}
.cal-cell.today.sun .cal-cell-d,.cal-cell.today.sat .cal-cell-d{color:white;}
.cal-cell-d{width:22px;height:22px;display:flex;align-items:center;justify-content:center;font-size:11.5px;font-weight:600;margin-bottom:3px;border-radius:50%;}
.ev{border-radius:3px;padding:2px 5px;font-size:10px;font-weight:600;margin-bottom:2px;cursor:pointer;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.ev:hover{opacity:.8;}
.ev.pending{background:var(--yp);color:#92400E;border-left:2px solid #F59E0B;}
.ev.approved{background:var(--gp);color:#15803D;border-left:2px solid var(--green);}
.ev.notified{background:var(--bp);color:#1D4ED8;border-left:2px solid var(--blue);}
.ev.more{background:#F1F5F9;color:var(--text2);}

/* FIX10: clean week view */
.cal-week-wrap,.cal-day-wrap{background:var(--card);border-radius:var(--r);border:1px solid var(--border);box-shadow:var(--sh);overflow:hidden;}
.cal-week-head{display:grid;grid-template-columns:56px repeat(7,1fr);border-bottom:1px solid var(--border);}
.cal-whc{padding:9px 6px;text-align:center;border-right:1px solid var(--border);font-size:11px;}
.cal-whc:last-child{border-right:none;}
.cal-whc-dow{font-weight:700;color:var(--text2);font-size:10px;letter-spacing:.04em;}
.cal-whc-date{font-size:18px;font-weight:900;color:var(--text);margin-top:2px;line-height:1;}
.cal-whc-date.today{background:var(--orange);color:white;border-radius:50%;width:32px;height:32px;display:flex;align-items:center;justify-content:center;margin:2px auto 0;font-size:14px;}
.cal-week-body{display:grid;grid-template-columns:56px repeat(7,1fr);max-height:520px;overflow-y:auto;}
.cal-hl{padding:8px 6px 0;font-size:10px;color:var(--text3);font-weight:600;border-right:1px solid var(--border);text-align:right;white-space:nowrap;border-bottom:1px solid #F1F5F9;}
.cal-wslot{min-height:44px;border-right:1px solid var(--border);border-bottom:1px solid #F1F5F9;padding:3px 4px;}
.cal-wslot:last-child{border-right:none;}
.wev{border-radius:4px;padding:3px 5px;font-size:10px;font-weight:600;margin-bottom:2px;cursor:pointer;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;display:block;}
.wev:hover{opacity:.8;}
.wev.pending{background:var(--yp);color:#92400E;border-left:2px solid #F59E0B;}
.wev.approved{background:var(--gp);color:#15803D;border-left:2px solid var(--green);}
.wev.notified{background:var(--bp);color:#1D4ED8;border-left:2px solid var(--blue);}

.cal-day-head{padding:14px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.cal-day-body{display:grid;grid-template-columns:56px 1fr;max-height:520px;overflow-y:auto;}
.cal-dhl{padding:8px 6px 0;font-size:10px;color:var(--text3);border-right:1px solid var(--border);text-align:right;}
.cal-dslot{min-height:50px;border-bottom:1px solid #F1F5F9;padding:4px 10px;}
.dev{border-radius:6px;padding:7px 10px;font-size:12px;font-weight:600;margin-bottom:3px;cursor:pointer;display:flex;align-items:center;justify-content:space-between;}

/* ── MODAL ── */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:500;align-items:center;justify-content:center;}
.overlay.open{display:flex;}
.modal{background:var(--white);border-radius:var(--r);padding:26px 24px;width:460px;max-width:95vw;max-height:88vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.18);animation:mi .2s ease;}
.modal.wide{width:540px;}
@keyframes mi{from{opacity:0;transform:scale(.96);}to{opacity:1;transform:scale(1);}}
.modal-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;}
.modal-hd h2{font-size:15px;font-weight:700;}
.modal-x{width:26px;height:26px;border-radius:50%;border:none;background:#F1F5F9;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.modal-x svg{width:13px;height:13px;}
.modal-info-grid{background:#F8FAFC;border-radius:var(--rs);border:1px solid var(--border);padding:14px;margin-bottom:14px;}
.mir{display:flex;gap:10px;margin-bottom:8px;}
.mir:last-child{margin-bottom:0;}
.mik{font-size:11.5px;color:var(--text2);font-weight:600;width:62px;flex-shrink:0;padding-top:1px;}
.miv{font-size:13px;color:var(--text);font-weight:500;}
.modal-acts{display:flex;gap:9px;margin-top:18px;}
.mbtn{flex:1;padding:10px;border-radius:var(--rx);font-size:13px;font-weight:700;cursor:pointer;border:none;display:flex;align-items:center;justify-content:center;gap:6px;transition:all .2s;}
.mbtn svg{width:15px;height:15px;}
.mbtn-approve{background:var(--green);color:white;}
.mbtn-approve:hover{background:#16A34A;}
.mbtn-reject{background:var(--rp);color:var(--red);border:1.5px solid var(--rb);}
.mbtn-reject:hover{background:#FEE2E2;}
.mbtn-line{background:var(--line);color:white;}
.mbtn-line:hover{background:#05A847;}
.mbtn-close{background:#F1F5F9;color:var(--text2);}
.modal-divider{height:1px;background:var(--border);margin:16px 0;}

.edit-row{margin-bottom:12px;}
.edit-label{font-size:11.5px;font-weight:700;color:var(--text2);margin-bottom:5px;display:block;}
.edit-inp{width:100%;padding:9px 12px;border:1.5px solid var(--border);border-radius:var(--rx);font-family:inherit;font-size:13px;color:var(--text);outline:none;transition:border-color .2s;}
.edit-inp:focus{border-color:var(--orange);}
.edit-row-split{display:flex;gap:8px;}
.edit-row-split .edit-inp{flex:1;}

/* conflict warning */
.conflict-warn{background:var(--rp);border:1px solid var(--rb);border-radius:var(--rx);padding:8px 12px;font-size:12px;color:var(--red);font-weight:600;margin-top:6px;display:none;}
.conflict-warn.show{display:block;}

/* ── TOAST ── */
.toast{position:fixed;bottom:24px;right:24px;background:var(--sb);color:white;padding:11px 16px;border-radius:var(--rs);font-size:12.5px;font-weight:600;z-index:9999;display:flex;align-items:center;gap:8px;box-shadow:var(--shm);transform:translateY(60px);opacity:0;transition:all .25s;pointer-events:none;}
.toast svg{width:15px;height:15px;}
.toast.show{transform:translateY(0);opacity:1;}
.toast.success{border-left:4px solid var(--green);}
.toast.info{border-left:4px solid var(--blue);}
.toast.warn{border-left:4px solid var(--yellow);}
.toast.err{border-left:4px solid var(--red);}

/* line toggle button */
.line-toggle{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:700;padding:3px 8px;border-radius:20px;border:1.5px solid;cursor:pointer;transition:all .15s;background:none;}
.line-toggle.sent{color:var(--line);border-color:#A7F3D0;background:#F0FDF4;}
.line-toggle.sent:hover{background:#DCFCE7;border-color:var(--line);}
.line-toggle.unsent{color:var(--text3);border-color:var(--border);background:var(--white);}
.line-toggle.unsent:hover{color:var(--line);border-color:#A7F3D0;background:#F0FDF4;}

/* filter count badges */
.ft-count{display:inline-flex;align-items:center;justify-content:center;min-width:16px;height:16px;padding:0 4px;border-radius:10px;font-size:10px;font-weight:700;background:rgba(0,0,0,.08);color:inherit;margin-left:2px;}
.ft.active .ft-count{background:rgba(244,123,32,.2);}

/* stats bar */
.tbl-stats{margin-left:auto;font-size:12px;color:var(--text2);white-space:nowrap;}
.tbl-stats strong{color:var(--text);font-weight:700;}

/* per-button count badge */
.ft-cnt{display:inline-flex;align-items:center;justify-content:center;min-width:16px;height:16px;padding:0 4px;border-radius:10px;font-size:10px;font-weight:700;background:rgba(0,0,0,.08);color:inherit;margin-left:3px;}
.ft.active .ft-cnt{background:rgba(244,123,32,.22);}

/* SortableJS drag styles */
.sp-drag-ghost{opacity:0!important;}
.sp-drag-chosen{background:#FFFBF7!important;}
.sp-drag-active{box-shadow:0 4px 16px rgba(0,0,0,.12);background:white!important;}

/* ── LOGIN OVERLAY ── */
#loginOverlay{display:none;position:fixed;inset:0;z-index:9999;background:linear-gradient(135deg,#1a0a00 0%,#2d1200 40%,#1C2333 100%);align-items:center;justify-content:center;}
#loginOverlay.visible{display:flex;}
.login-box{background:#fff;border-radius:20px;padding:44px 40px;width:400px;max-width:92vw;box-shadow:0 8px 48px rgba(0,0,0,.35);text-align:center;position:relative;z-index:1;}
.login-logo{width:56px;height:56px;border-radius:16px;background:linear-gradient(135deg,var(--orange),var(--ol));display:flex;align-items:center;justify-content:center;margin:0 auto 18px;box-shadow:0 4px 20px rgba(244,123,32,.45);}
.login-logo svg{width:28px;height:28px;}
.login-title{font-size:20px;font-weight:700;color:var(--text);margin-bottom:6px;}
.login-sub{font-size:13px;color:var(--text2);margin-bottom:32px;}
.login-err{display:none;background:var(--rp);border:1px solid var(--rb);border-radius:var(--rx);padding:8px 12px;font-size:12px;color:var(--red);font-weight:600;margin-bottom:16px;text-align:left;}
.login-google-btn{display:flex;align-items:center;justify-content:center;gap:10px;width:100%;padding:13px;background:white;color:var(--text);border:1.5px solid var(--border);border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;box-shadow:0 1px 6px rgba(0,0,0,.08);transition:all .18s;font-family:inherit;}
.login-google-btn:hover{border-color:#aaa;box-shadow:0 4px 16px rgba(0,0,0,.13);transform:translateY(-1px);}
.login-google-btn:disabled{opacity:.6;cursor:not-allowed;transform:none;}
.login-hint{margin-top:18px;font-size:11px;color:var(--text3);}
/* subtle animated glow orbs */
#loginOverlay::before{content:'';position:fixed;width:500px;height:500px;border-radius:50%;background:radial-gradient(circle,rgba(244,123,32,.18) 0%,transparent 70%);top:-100px;left:-100px;pointer-events:none;}
#loginOverlay::after{content:'';position:fixed;width:400px;height:400px;border-radius:50%;background:radial-gradient(circle,rgba(244,123,32,.1) 0%,transparent 70%);bottom:-80px;right:-80px;pointer-events:none;}

/* ── USER MANAGEMENT ── */
.um-row{display:flex;align-items:center;gap:10px;padding:10px 14px;border-bottom:1px solid var(--border);transition:background .12s;}
.um-row:last-child{border-bottom:none;}
.um-row:hover{background:#F8FAFC;}
.um-email{flex:1;font-size:13px;font-weight:500;color:var(--text);}
.um-badge{font-size:11px;font-weight:700;padding:2px 8px;border-radius:10px;}
.um-badge.on{background:var(--gp);color:#15803D;border:1px solid var(--gb);}
.um-badge.off{background:var(--rp);color:var(--red);border:1px solid var(--rb);}
.um-add-row{display:flex;gap:8px;padding:14px;border-bottom:1px solid var(--border);background:#F8FAFC;}
.um-add-inp{flex:1;padding:8px 12px;border:1.5px solid var(--border);border-radius:var(--rx);font-family:inherit;font-size:13px;outline:none;}
.um-add-inp:focus{border-color:var(--orange);}
.um-self{background:var(--op)!important;}
.filter-select{padding:5px 10px;border-radius:var(--rx);border:1.5px solid var(--border);font-family:inherit;font-size:12px;color:var(--text2);background:var(--white);outline:none;cursor:pointer;transition:border-color .15s;}
.filter-select:focus,.filter-select:hover{border-color:var(--orange);color:var(--text);}

/* filter separator */
.tbl-filter-sep{width:1px;height:22px;background:var(--border);margin:0 2px;}

/* table row hover */
tr:hover td{background:#FFF9F5;}

/* line toggle — locked (notified) and disabled (pending) */
.line-toggle.locked{cursor:default;pointer-events:none;}
.line-toggle.disabled{color:var(--text3);border-color:var(--border);background:var(--white);cursor:not-allowed;opacity:.5;}

/* detail cards */
.detail-card{background:#F8FAFC;border-radius:var(--rs);border:1px solid var(--border);padding:14px 16px;}
.detail-card-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;padding-bottom:8px;border-bottom:1px solid var(--border);}
.detail-card-title{font-size:11px;font-weight:700;color:var(--text2);letter-spacing:.06em;text-transform:uppercase;}
.detail-card-badges{display:flex;align-items:center;gap:5px;}

/* schedule layout: left 40% fixed, right 60% scrollable */
.slot-layout{display:flex;gap:0;align-items:flex-start;min-width:0;}
.slot-left{width:40%;min-width:260px;flex-shrink:0;padding-right:28px;box-sizing:border-box;}
.slot-divider{width:1px;background:var(--border);align-self:stretch;flex-shrink:0;min-height:420px;margin:0 4px;}
.slot-right{flex:1;min-width:0;padding-left:20px;height:620px;overflow-y:auto;position:relative;}
.slot-summary-sticky-hd{position:sticky;top:0;background:var(--card);z-index:10;padding-bottom:6px;margin-bottom:4px;border-bottom:1px solid var(--border);}
.slot-summary-sticky-hd{position:sticky;top:0;background:white;z-index:10;padding-bottom:8px;margin-bottom:2px;}

/* slot cal grid — grid-auto-rows ensures all cells same height per row */
.slot-cal-grid{display:grid;grid-template-columns:repeat(7,1fr);grid-auto-rows:36px;gap:5px;margin-bottom:14px;padding-right:16px;}
.slot-day{border-radius:var(--rx);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:500;cursor:pointer;border:1.5px solid transparent;transition:all .15s;position:relative;background:transparent;}
.slot-day.empty{cursor:default;color:#C5CDD9;pointer-events:none;}
.slot-day.past{color:var(--text3);cursor:not-allowed;}
.slot-day.selected{color:white;box-shadow:0 2px 8px rgba(0,0,0,.18);}
.slot-day:not(.empty):not(.past):not(.selected):hover{border-color:var(--slot-hover-border,var(--ob));background:var(--slot-hover-bg,var(--op));}
.slot-day.sunday:not(.selected){color:#E05252;}
.slot-day.saturday:not(.selected){color:#5B8DD9;}
.slot-day-dot{position:absolute;bottom:2px;left:50%;transform:translateX(-50%);width:4px;height:4px;border-radius:50%;background:var(--orange);}
.slot-day.selected .slot-day-dot{background:rgba(255,255,255,.7);}

/* time panel embedded below cal */
.time-slot-panel{background:#F8FAFC;border-radius:var(--rs);border:1px solid var(--border);padding:14px 16px;margin-top:0;}

/* slot summary on right — hover rows, chips wrap */
.slot-summary-chips{display:flex;gap:5px;flex-wrap:wrap;flex:1;}
.slot-summary-item{display:flex;align-items:flex-start;gap:10px;padding:8px 12px;background:var(--white);border-radius:var(--rx);border:1px solid var(--border);margin-bottom:6px;transition:all .15s;cursor:pointer;}
.slot-summary-item:hover{border-color:var(--slot-hover-border,var(--ob));background:var(--slot-hover-bg,#FFFAF5);}
.slot-summary-item.summary-active{border-color:var(--orange);background:var(--op);}

/* color dropdown */
.color-dropdown-wrap{position:relative;display:inline-block;width:100%;}
.color-dropdown-btn{display:flex;align-items:center;gap:8px;width:100%;padding:8px 10px;border:1.5px solid var(--border);border-radius:var(--rx);background:var(--white);cursor:pointer;font-family:inherit;font-size:13px;color:var(--text);transition:border-color .2s;justify-content:center;}
.color-dropdown-btn:hover,.color-dropdown-btn:focus{border-color:var(--orange);outline:none;}
.color-dropdown-dot{width:22px;height:22px;border-radius:50%;flex-shrink:0;}
.color-dropdown-list{position:absolute;top:calc(100% + 4px);left:0;background:var(--white);border:1.5px solid var(--border);border-radius:var(--rx);box-shadow:var(--shm);z-index:400;display:none;min-width:48px;}
.color-dropdown-list.open{display:block;}
.color-dropdown-opt{display:flex;align-items:center;justify-content:center;padding:8px 12px;cursor:pointer;transition:background .12s;}
.color-dropdown-opt:hover{background:#F8FAFC;}
.color-dropdown-opt.active{background:var(--op);}
.color-dropdown-opt-dot{width:22px;height:22px;border-radius:50%;flex-shrink:0;}

/* dow chips for global time settings */
.dow-chip{padding:6px 12px;border-radius:20px;font-size:12px;font-weight:600;border:1.5px solid;cursor:pointer;transition:all .15s;}
.dow-chip:hover{opacity:.85;}

/* sidebar badge for pending count */
.ni-badge{display:inline-flex;align-items:center;justify-content:center;min-width:18px;height:18px;padding:0 5px;border-radius:10px;background:var(--red);color:white;font-size:10px;font-weight:700;margin-left:auto;}

/* stats grid */
.stats-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:18px;}
.stat-card{background:var(--card);border-radius:var(--r);border:1px solid var(--border);box-shadow:var(--sh);padding:20px 22px;}
.stat-card-title{font-size:13px;font-weight:700;color:var(--text);margin-bottom:16px;}
.stat-chart{width:100%;height:200px;display:flex;align-items:flex-end;gap:6px;}
.stat-bar-wrap{display:flex;flex-direction:column;align-items:center;flex:1;gap:4px;}
.stat-bar{width:100%;border-radius:4px 4px 0 0;transition:height .3s;}
.stat-bar-label{font-size:10px;color:var(--text2);text-align:center;white-space:nowrap;}
.stat-bar-val{font-size:10px;font-weight:700;color:var(--text);}
.stat-pie-wrap{display:flex;align-items:center;gap:20px;padding:8px 0;}
.stat-pie-legend{display:flex;flex-direction:column;gap:7px;flex:1;}
.stat-pie-item{display:flex;align-items:center;gap:7px;font-size:12px;}
.stat-pie-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
.stat-doc-bars{display:flex;flex-direction:column;gap:10px;}
.stat-doc-row{display:flex;align-items:center;gap:10px;}
.stat-doc-name{font-size:12px;font-weight:600;color:var(--text);width:60px;flex-shrink:0;}
.stat-doc-bar-bg{flex:1;height:18px;background:#F1F5F9;border-radius:10px;overflow:hidden;}
.stat-doc-bar-fill{height:100%;border-radius:10px;transition:width .4s;}
.stat-doc-count{font-size:12px;font-weight:700;color:var(--text);width:24px;text-align:right;}

/* review lock button */
.review-lock-btn{border-color:var(--border)!important;color:var(--text3)!important;background:var(--white)!important;}
.review-lock-btn:hover{border-color:var(--orange)!important;color:var(--orange)!important;}

/* review row hover with doctor color */
#panel-review tr.rev-row:hover td{background:var(--rev-hover-bg,#EDF2F7);}

/* review table */
.review-empty{text-align:center;padding:60px 20px;color:var(--text3);}
.review-empty svg{width:48px;height:48px;opacity:.3;display:block;margin:0 auto 12px;}

.empty{text-align:center;padding:40px 20px;color:var(--text3);font-size:13px;}

/* ── PRINT ICON BTN ── */


/* ── SLOT CHIP STRIKETHROUGH ── */
.slot-summary-chip.wk-closed{background:#F1F5F9;color:var(--text3);border-color:var(--border);text-decoration:line-through;opacity:.65;}
.slot-summary-chip.booked-chip{background:#334155;color:#fff;border-color:#334155;font-weight:700;}

/* ── SELFPAY PICKER (round checkbox) ── */
.sp-check-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border:1.5px solid var(--border);border-radius:var(--rx);margin-bottom:7px;cursor:pointer;transition:all .14s;background:white;}
.sp-check-item:hover{border-color:var(--ob);}
.sp-check-item.sel{border-color:var(--orange);background:var(--op);}
.sp-round-cb{width:18px;height:18px;border-radius:50%;border:2px solid var(--border);background:white;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .15s;cursor:pointer;}
.sp-round-cb.chk{background:var(--orange);border-color:var(--orange);}
.sp-round-cb.chk::after{content:'';display:block;width:5px;height:9px;border:2px solid white;border-top:none;border-left:none;transform:rotate(45deg) translateY(-1px);}
.sp-check-name{flex:1;font-size:13px;font-weight:600;}
.sp-check-unit{font-size:12px;color:var(--text2);}
.sp-qty{width:60px;padding:5px 8px;border:1.5px solid var(--border);border-radius:var(--rx);font-size:13px;text-align:center;outline:none;}
.sp-qty:focus{border-color:var(--orange);}

/* ── DOCTOR CARD BARS ── */
.dc-limit-bar-wrap{display:flex;flex-direction:column;gap:5px;margin-top:4px;}
.dc-limit-row{display:flex;align-items:center;gap:7px;}
.dc-limit-lbl{font-size:10px;font-weight:700;color:var(--text2);width:22px;flex-shrink:0;}
.dc-limit-bar{flex:1;height:6px;background:#EEF2F7;border-radius:3px;overflow:hidden;}
.dc-limit-fill{height:100%;border-radius:3px;background:var(--orange);}
.dc-limit-num{font-size:10px;font-weight:700;color:var(--text2);white-space:nowrap;}

/* ── SELFPAY OP SETTINGS ── */
.sp-op-section{margin-bottom:18px;}
.sp-op-header{display:flex;align-items:center;gap:8px;padding:10px 14px;border-radius:var(--rx);cursor:pointer;user-select:none;}
.sp-op-header:hover{opacity:.85;}
.sp-op-body{padding:10px 14px 14px;background:#F8FAFC;border:1px solid var(--border);border-top:none;border-radius:0 0 var(--rx) var(--rx);}
.sp-op-item-row{display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid var(--border);}
.sp-op-item-row:last-child{border-bottom:none;}
.sp-op-item-name{flex:1;font-size:12px;font-weight:600;color:var(--text);}
.sp-op-item-price{font-size:11px;color:var(--text2);width:80px;text-align:right;}
.sp-tag-req{font-size:10px;font-weight:700;padding:2px 7px;border-radius:10px;background:var(--rp);color:var(--red);border:1px solid var(--rb);}
.sp-tag-opt{font-size:10px;font-weight:700;padding:2px 7px;border-radius:10px;background:var(--gp);color:#15803D;border:1px solid var(--gb);}
.sp-tag-none{font-size:10px;color:var(--text3);}
.sp-role-btn{padding:3px 9px;border-radius:10px;font-size:10px;font-weight:700;cursor:pointer;border:1.5px solid;transition:all .12s;}
.sp-role-btn.req{background:var(--rp);color:var(--red);border-color:var(--rb);}
.sp-role-btn.req:hover{background:#fee2e2;}
.sp-role-btn.opt{background:var(--gp);color:#15803D;border-color:var(--gb);}
.sp-role-btn.opt:hover{background:#dcfce7;}
.sp-role-btn.none-btn{background:#F1F5F9;color:var(--text2);border-color:var(--border);}
.sp-role-btn.none-btn:hover{background:var(--border);}

/* ── SLOT SUMMARY STICKY HEADER ── */
.slot-summary-sticky-hd{position:sticky;top:0;background:white;z-index:10;padding-bottom:8px;margin-bottom:2px;}

const OPS_LIST = ['下鼻甲消融','鼻內電燒','減重','其他手術'];

// 8 preset doctor colours: [bg, border, text, dot]
const DOC_COLORS = [
  {id:'c1', bg:'#EFF6FF', border:'#BFDBFE', text:'#1D4ED8', dot:'#3B82F6'},
  {id:'c2', bg:'#F0FDF4', border:'#BBF7D0', text:'#15803D', dot:'#22C55E'},
  {id:'c3', bg:'#FFF7ED', border:'#FED7AA', text:'#C2410C', dot:'#F97316'},
  {id:'c4', bg:'#FDF4FF', border:'#E9D5FF', text:'#7E22CE', dot:'#A855F7'},
  {id:'c5', bg:'#FFF1F2', border:'#FECDD3', text:'#BE123C', dot:'#F43F5E'},
  {id:'c6', bg:'#F0FDFA', border:'#99F6E4', text:'#0F766E', dot:'#14B8A6'},
  {id:'c7', bg:'#FEFCE8', border:'#FEF08A', text:'#A16207', dot:'#EAB308'},
  {id:'c8', bg:'#F8FAFC', border:'#CBD5E1', text:'#475569', dot:'#64748B'},
];

function docColor(docId){
  const d=doctors.find(x=>String(x.id)===String(docId));
  if(!d||!d.colorId) return DOC_COLORS[0];
  return DOC_COLORS.find(c=>c.id===d.colorId)||DOC_COLORS[0];
}

let doctors = [];

let bookings = [];
let nextId = 7;

// slotSettings: keyed as "docId:YYYY-MM-DD" → [slots]
let slotSettings = {};
let committedSlotSettings = {};

const ALL_MORNING   = ['09:00','09:30','10:00','10:30','11:00','11:30'];
const ALL_AFTERNOON = ['13:00','13:30','14:00','14:30','15:00','15:30','16:00','16:30'];
const ALL_SLOTS     = [...ALL_MORNING, ...ALL_AFTERNOON];

let calView = 'month', calDate = new Date(2026,3,1);
let slotCalDate = new Date(2026,3,1), slotSelectedDay = null;

/* ═══════════════════════════════════════
   NAV
═══════════════════════════════════════ */
const panelNames = {bookings:'預約清單',review:'醫師審核',calendar:'手術排程',schedule:'預約時段設定',doctors:'醫師與術式管理',selfpay:'自費項目設定',users:'使用者管理'};

window.nav = function(id) {
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.ni').forEach(b=>b.classList.remove('active'));
  document.getElementById('panel-'+id).classList.add('active');
  document.getElementById('topbarTitle').textContent = panelNames[id];
  document.querySelectorAll('.ni').forEach(b=>{
    if(b.getAttribute('onclick')&&b.getAttribute('onclick').includes("'"+id+"'"))b.classList.add('active');
  });
  // topbar right: context-specific
  const tr = document.getElementById('topbarRight');

function fmtDate(ds){const[y,m,d]=ds.split('-');return`${y}/${parseInt(m)}/${parseInt(d)}`;}
function docName(id,fallback){const d=doctors.find(x=>String(x.id)===String(id));return d?d.name:(fallback||'');}
function isDocRetired(b){return !doctors.find(d=>String(d.id)===String(b.docId));}

let toastTimer;
function toast(type,msg){
  const t=document.getElementById('toast');
  document.getElementById('toastMsg').textContent=msg;
  t.className='toast '+type+' show';
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>t.classList.remove('show'),3000);
}

/* conflict check — returns existing booking if slot is taken */
function getConflict(date, slot, excludeId=null) {
  return bookings.find(b =>
    b.date === date &&
    b.slot === slot &&
    b.status !== 'rejected' &&
    b.id !== excludeId
  );
}

function countFilter(f){
  if(f==='notified') return bookings.filter(b=>b.status==='approved'&&b.lineNotified).length;
  if(f==='all') return bookings.length;
  return bookings.filter(b=>b.status===f).length;

function badge(s){

function renderBookings(){
  // today string for filtering past dates from display
  const todayStr=new Date().toISOString().slice(0,10);

  // build doctor filter select options
  const bdf=document.getElementById('bookingDocSel');
  if(bdf){
    const prev=bdf.value;
    bdf.innerHTML=`<option value="all">全部醫師</option>`+doctors.map(d=>`<option value="${d.id}">${d.name} 醫師</option>`).join('');
    if(prev&&prev!=='all') bdf.value=prev;
  }

  const q=(document.getElementById('searchInp')||{value:''}).value.toLowerCase();

  // base: filtered by doctor, and only today or future dates
  let base=[...bookings].filter(b=>b.date>=todayStr);
  if(bookingDocFilter!=='all') base=base.filter(b=>String(b.docId)===String(bookingDocFilter));

  // per-button counts (respect doctor filter, ignore status filter)
  const cnt={
    all: base.length,
    pending: base.filter(b=>b.status==='pending').length,
    approved: base.filter(b=>b.status==='approved').length,
    rejected: base.filter(b=>b.status==='rejected').length,
    // LINE 待通知: approved 或 rejected 但尚未通知
    unnotified: base.filter(b=>(b.status==='approved'||b.status==='rejected')&&!b.lineNotified).length,
  };
  ['all','pending','approved','rejected','unnotified'].forEach(k=>{
    const el=document.getElementById('fc_'+k);
    if(el){
      el.textContent=cnt[k];
      if(k==='unnotified'){
        el.style.background=cnt[k]>0?'var(--red)':'rgba(0,0,0,.08)';
        el.style.color=cnt[k]>0?'white':'inherit';
      }
    }
  });

  let data=[...base];
  if(bookingStatusFilter==='unnotified'){
    data=data.filter(b=>(b.status==='approved'||b.status==='rejected')&&!b.lineNotified);
  } else if(bookingStatusFilter!=='all'){
    data=data.filter(b=>b.status===bookingStatusFilter);
  }
  if(q) data=data.filter(b=>b.name.toLowerCase().includes(q)||b.caseNo.toLowerCase().includes(q));

  const statusOrder={pending:0,approved:1,rejected:2};
  const {col,dir}=bookingSort;
  data.sort((a,b2)=>{
    let av,bv;
    if(col==='date'){av=a.date+a.slot;bv=b2.date+b2.slot;}
    else if(col==='status'){av=statusOrder[a.status]??9;bv=statusOrder[b2.status]??9;}
    else if(col==='lineNotified'){
      // 排序優先：已通知(0) → 可點擊標記(1) → 請先核准(2)
      const lineOrder=b=>{
        if(b.lineNotified) return 0;
        if(b.status==='pending') return 2;
        return 1;
      };
      av=lineOrder(a);bv=lineOrder(b2);
    }
    else {av=a[col]||'';bv=b2[col]||'';}
    return dir==='asc'?(av<bv?-1:av>bv?1:0):(av>bv?-1:av<bv?1:0);
  });

  const t=document.getElementById('bookingsTable');
  if(!data.length){t.innerHTML=`<tbody><tr><td colspan="10"><div class="empty">沒有符合的預約記錄</div></td></tr></tbody>`;return;}

  function thSort(col,label){
    const active=bookingSort.col===col;
    const d=active?bookingSort.dir:'';
    return`<th class="sortable${active?' '+d:''}" onclick="setSort('${col}')">${label}<span class="sort-icon"></span></th>`;
  }

  t.innerHTML=`<thead><tr>
    <th>病歷號</th><th>姓名</th>${thSort('date','手術日期')}<th>時段</th>
    <th>術式</th><th>醫師</th>${thSort('status','狀態')}${thSort('lineNotified','LINE')}<th>備註</th><th>操作</th>
  </tr></thead><tbody>${data.map(b=>{
    const retired=isDocRetired(b);
    const dname=docName(b.docId,b.docName)||'—';
    return`<tr>
    <td style="font-size:12px;color:var(--text2);">${b.caseNo||'—'}</td>
    <td class="td-name">${b.name}</td>
    <td class="td-date">${fmtDate(b.date)}</td>
    <td style="font-weight:700;font-size:13px;color:var(--text);">${b.slot}</td>
    <td style="font-size:12px;">${b.op||'—'}</td>
    <td style="font-size:12px;color:var(--text2);">${dname}</td>
    <td>${badge(b.status)}</td>
    <td>${lineCol(b)}</td>
    <td style="font-size:12px;color:var(--text2);width:130px;max-width:130px;white-space:normal;word-break:break-all;line-height:1.5;">${b.note||'—'}</td>
    <td><div class="act-row">
      <button class="icon-btn ib-detail" title="詳情" onclick="openDetail('${b.id}')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg></button>
      <button class="icon-btn ib-del" title="刪除" onclick="deleteBooking('${b.id}')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a1 1 0 011-1h4a1 1 0 011 1v2"/></svg></button>
    </div></td>
  </tr>`;}).join('')}</tbody>`;
}

/* LINE column */
function lineCol(b){
  if(b.lineNotified){
    // locked — only editable inside detail modal
    return `<span class="line-toggle sent locked" title="如需修改請進入編輯"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" style="width:12px;height:12px;"><polyline points="20 6 9 17 4 12"/></svg>已通知</span>`;
  }
  if(b.status==='pending'){
    // pending — cannot notify yet
    return `<span class="line-toggle disabled" title="請先核准再通知"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" style="width:12px;height:12px;"><path d="M21 11.5a8.38 8.38 0 01-.9 3.8 8.5 8.5 0 01-7.6 4.7 8.38 8.38 0 01-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 01-.9-3.8 8.5 8.5 0 014.7-7.6 8.38 8.38 0 013.8-.9h.5a8.48 8.48 0 018 8v.5z"/></svg>未通知</span>`;
  }
  // approved or rejected — can click to notify
  return `<button class="line-toggle unsent" onclick="toggleLine('${b.id}')" title="點擊標記為已通知"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" style="width:12px;height:12px;"><path d="M21 11.5a8.38 8.38 0 01-.9 3.8 8.5 8.5 0 01-7.6 4.7 8.38 8.38 0 01-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 01-.9-3.8 8.5 8.5 0 014.7-7.6 8.38 8.38 0 013.8-.9h.5a8.48 8.48 0 018 8v.5z"/></svg>未通知</button>`;
}

// bday stored as "72/03/15", display same
function fmtBday(s){
  if(!s) return '—';
  // normalise: ensure 2-digit month and day
  const p=s.split('/');
  if(p.length===3) return `${p[0]}/${String(p[1]).padStart(2,'0')}/${String(p[2]).padStart(2,'0')}`;
  return s;
}
// parse "72/03/15" or "72/3/15" → {y,m,d}
function parseBday(s){
  if(!s) return {y:'',m:'',d:''};
  // legacy "民國 72年3月15日"
  const old=s.match(/(\d+)年(\d+)月(\d+)日/);
  if(old) return {y:old[1],m:String(old[2]).padStart(2,'0'),d:String(old[3]).padStart(2,'0')};
  const p=s.split('/');
  if(p.length===3) return {y:p[0],m:String(p[1]).padStart(2,'0'),d:String(p[2]).padStart(2,'0')};
  return {y:'',m:'',d:''};
}
function composeBday(y,m,d){
  if(!y||!m||!d) return '';
  return `${y}/${String(m).padStart(2,'0')}/${String(d).padStart(2,'0')}`;
}

/* 建立編輯模式的自費HTML（表格版） */
function buildEditSelfPayHTML(b){
  const docId=b.docId; const op=b.op||'';
  if(!docId||!op) return '<div style="font-size:12px;color:var(--text3);">請先選擇醫師與術式</div>';
  const key=docId+':'+op;
  const cfg=opSelfPay[key]||{required:[],optional:[],customItems:[]};
  const customItems=cfg.customItems||[];
  const curSel=(window._editingBookingId===b.id && window._editingTempSelfPay !== null && window._editingTempSelfPay !== undefined)
    ? window._editingTempSelfPay
    : (b.selfPayItems||[]);

  const activeItems=curSel.filter(x=>!x.retired).sort((a,b)=>(a.role==='required'?0:1)-(b.role==='required'?0:1));
  const retiredItems=curSel.filter(x=>x.retired);
  const allItems=[...activeItems,...retiredItems];

  if(!allItems.length){
    return `<div style="display:flex;align-items:center;gap:6px;margin-bottom:6px;">
      <span style="font-size:12px;color:var(--text3);">此術式尚未設定自費項目</span>
      <button type="button" style="background:none;border:none;cursor:pointer;color:var(--text2);padding:2px;display:flex;align-items:center;" onclick="openEditSelfPayPicker('${key}','${b.id}')" title="編輯自費項目">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" style="width:14px;height:14px;"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
      </button>
    </div>`;
  }

  let total=allItems.reduce((s,it)=>s+parseInt(it.price)*(parseInt(it.qty)||1),0);
  let html=`<table class="selfpay-tbl" style="width:100%;border-collapse:collapse;font-size:13px;">
    <thead><tr style="border-bottom:2px solid var(--border);">
      <th style="text-align:left;padding:6px 0;font-size:11px;font-weight:700;color:var(--text2);">品項</th>
      <th style="text-align:center;padding:6px 8px;font-size:11px;font-weight:700;color:var(--text2);width:50px;">數量</th>
      <th style="text-align:right;padding:6px 0;font-size:11px;font-weight:700;color:var(--text2);width:80px;">小計</th>
      <th style="width:28px;"></th>
    </tr></thead><tbody>`;

  activeItems.forEach(it=>{
    const isReq=it.role==='required';
    const qty=parseInt(it.qty)||1;
    const subtotal=parseInt(it.price)*qty;
    const nameHTML=isReq?`${it.name} <span style="color:var(--red);font-size:11px;">*</span>`:it.name;
    html+=`<tr style="border-bottom:1px solid #F1F5F9;">
      <td style="padding:7px 0;font-weight:${isReq?'600':'500'};">${nameHTML}</td>
      <td style="text-align:center;padding:7px 8px;">${qty}</td>
      <td style="text-align:right;padding:7px 0;font-weight:600;">$${subtotal.toLocaleString()}</td>
      <td></td>
    </tr>`;
  });

  if(retiredItems.length){
    retiredItems.forEach(it=>{
      const qty=parseInt(it.qty)||1;
      const subtotal=parseInt(it.price)*qty;
      html+=`<tr class="retired-row" style="border-bottom:1px solid #F1F5F9;background:var(--yp);">
        <td style="padding:7px 0;font-weight:500;"><span style="color:var(--yellow);margin-right:4px;" title="此項目已從清單中移除">⚠</span>${it.name}</td>
        <td style="text-align:center;padding:7px 8px;">${qty}</td>
        <td style="text-align:right;padding:7px 0;font-weight:600;">$${subtotal.toLocaleString()}</td>
        <td style="text-align:center;padding:7px 0;"><button type="button" onclick="removeRetiredItem('${it.id}')" style="background:none;border:none;cursor:pointer;color:var(--red);font-size:14px;line-height:1;padding:0 2px;" title="移除此項目">×</button></td>
      </tr>`;
    });
  }

  html+=`<tr style="border-top:2px solid var(--border);">
    <td colspan="2" style="padding:8px 0;font-size:12px;font-weight:700;color:var(--text2);">合計</td>
    <td style="text-align:right;padding:8px 0;font-size:15px;font-weight:700;color:var(--orange);">$${total.toLocaleString()}</td>
    <td></td>
  </tr>`;

  html+=`</tbody></table>`;
  return html;
}

/* 移除停售項目 */
window.removeRetiredItem = function(itemId){
  if(!window._editingTempSelfPay) return;
  window._editingTempSelfPay=window._editingTempSelfPay.filter(x=>x.id!==itemId);
  const wrap=document.getElementById('e_selfpay_wrap');
  if(wrap && window._editingBookingId){
    const b=bookings.find(x=>x.id===window._editingBookingId);
    if(b){
      const fakeB=Object.assign({},b,{selfPayItems:window._editingTempSelfPay});
      wrap.innerHTML=buildEditSelfPayHTML(fakeB);
    }
  }
  toast('success','已移除停售項目');
};

window.confirmEditSpPicker = function(key, bookingId){
  const b=bookings.find(x=>x.id===bookingId); if(!b) return;
  const cfg=opSelfPay[key]||{required:[],optional:[],customItems:[]};
  const customItems=cfg.customItems||[];
  const optItems=cfg.optional.map(id=>customItems.find(x=>x.id===id)).filter(Boolean);
  const reqItems=(window._editingTempSelfPay||[]).filter(x=>x.role==='required'&&!x.retired);
  const retiredItems=(window._editingTempSelfPay||[]).filter(x=>x.retired);
  const selOpt=[];
  optItems.forEach(it=>{
    const cb=document.getElementById('spcb_'+it.id);
    if(cb&&cb.classList.contains('chk')){
      const qty=Math.max(1,parseInt(document.getElementById('sppq_'+it.id)?.value||1)||1);
      selOpt.push({id:it.id,name:it.name,price:it.price,unit:it.unit||'',qty,role:'optional'});
    }
  });
  window._editingTempSelfPay=[...reqItems,...selOpt,...retiredItems];
  closeModal2();
  const wrap=document.getElementById('e_selfpay_wrap');
  if(wrap){
    const fakeB=Object.assign({},b,{selfPayItems:window._editingTempSelfPay});
    wrap.innerHTML=buildEditSelfPayHTML(fakeB);
  }
  toast('success','自費項目已更新，請按儲存生效');
};

window.cancelEdit = function(id){
  // 還原快照，丟棄所有暫存編輯（含自費）
  const snap = window._editingBookingSnapshot;
  if(snap){
    const idx = bookings.findIndex(x=>x.id===id);
    if(idx>=0) Object.assign(bookings[idx], JSON.parse(JSON.stringify(snap)));
  }
  window._editingBookingSnapshot = null;
  window._editingBookingId = null;
  const b = bookings.find(x=>x.id===id);
  if(b) _renderDetailModal(b, false, false);
};

window.saveEdit = function(id){
  const b=bookings.find(x=>x.id===id);if(!b)return;
  const date=document.getElementById('e_date').value||b.date;
  const slot=document.getElementById('e_slot').value;
  if(!slot){toast('err','請選擇手術時段');return;}
  // 不允許將日期/時段更改為過去
  const now=new Date();
  const todayStr=now.toISOString().slice(0,10);
  if(date<todayStr){toast('err','不可將手術日期更改為過去日期');return;}
  if(date===todayStr){
    const[hh,mm]=slot.split(':').map(Number);
    const slotTime=new Date(now.getFullYear(),now.getMonth(),now.getDate(),hh,mm,0,0);
    if(slotTime<=now){toast('err','不可將手術時段更改為已過的時段');return;}
  }
  const editDocId=document.getElementById('e_doc').value||b.docId;
  if(bookings.find(x=>x.date===date&&x.slot===slot&&String(x.docId)===String(editDocId)&&x.status!=='rejected'&&x.id!==id)){toast('err','時段衝突，請更換時間');return;}
  b.name=document.getElementById('e_name').value.trim()||b.name;
  b.caseNo=document.getElementById('e_caseNo').value.trim();
  const by=document.getElementById('e_bday_y').value.trim();
  const bm=document.getElementById('e_bday_m').value.trim();
  const bd=document.getElementById('e_bday_d').value.trim();
  if(by&&bm&&bd) b.bday=composeBday(by,bm,bd);
  b.phone=document.getElementById('e_phone').value.trim()||b.phone;
  b.date=date; b.slot=slot;
  const newDocId=document.getElementById('e_doc').value||null;
  if(!newDocId){toast('err','請指定負責醫師');return;}
  const docChanged=String(newDocId)!==String(b.docId);
  b.docId=newDocId;
  const editedDocObj=doctors.find(d=>String(d.id)===String(b.docId));
  b.docName=editedDocObj?editedDocObj.name:(b.docName||'');
  b.op=document.getElementById('e_op').value;
  b.status=docChanged?'pending':document.getElementById('e_status').value;
  b.lineNotified=document.getElementById('e_line').value==='1';
  b.note=document.getElementById('e_note').value.trim();
  // selfPayItems 從暫存讀取（不從 b 直接讀，避免未確認的舊狀態）
  // 儲存時清除 retired 標記，不寫入 Firebase
  const editSelfPayResult=(window._editingTempSelfPay||b.selfPayItems||[]).map(x=>{
    const item={...x}; delete item.retired; return item;
  });
  b.selfPayItems=editSelfPayResult;
  // 清除暫存
  window._editingTempSelfPay=null;
  window._editingBookingSnapshot=null;
  window._editingBookingId=null;
  if(b.fbId && window._fbSaveEdit) window._fbSaveEdit(b.fbId,{
    caseNo:b.caseNo||'',
    name:b.name,bday:b.bday,phone:b.phone,
    date:b.date,slot:b.slot,docId:b.docId,docName:b.docName||'',
    op:b.op,status:b.status,lineNotified:b.lineNotified,note:b.note,
    selfPayItems:editSelfPayResult
  });
  renderBookings();
  if(document.getElementById('panel-calendar').classList.contains('active')) renderCal();
  updateReviewBadge();
  toast('success','資料已更新');
  if(docChanged) toast('warn','醫師已變更，狀態自動改為待審核');
  // 儲存後回到詳情頁
  _renderDetailModal(b, false, false);
}

window.onEditDocChange = function(){

  const doc=doctors.find(d=>String(d.id)===String(docId));
  const opSel=document.getElementById('e_op');

  if(slotEl) slotEl.innerHTML='<option value="">— 請先選擇日期 —</option>';
  // 重建自費（依新醫師+新術式）
  onEditOpChange();
}

window.onEditOpChange = function(){
  const wrap=document.getElementById('e_selfpay_wrap');
  if(!wrap) return;
  const docId=document.getElementById('e_doc')?.value||'';
  const op=document.getElementById('e_op')?.value||'';
  if(!docId||!op){wrap.innerHTML='<div style="font-size:12px;color:var(--text3);">請先選擇醫師與術式</div>';return;}
  // 重置暫存為只有必要費用
  const key=docId+':'+op;
  const cfg=opSelfPay[key]||{required:[],optional:[],customItems:[]};
  const customItems=cfg.customItems||[];
  window._editingTempSelfPay=cfg.required.map(rid=>{
    const it=customItems.find(x=>x.id===rid);
    return it?{id:it.id,name:it.name,price:it.price,unit:it.unit||'',qty:1,role:'required'}:null;
  }).filter(Boolean);
  // 更新標題旁筆icon的key
  const section=document.getElementById('e_selfpay_section');

      const fakeB=Object.assign({},b,{docId,op,selfPayItems:window._editingTempSelfPay});
      wrap.innerHTML=buildEditSelfPayHTML(fakeB);

    }
  }
  const fakeB={id:window._editingBookingId||'', docId,op,selfPayItems:window._editingTempSelfPay};
  wrap.innerHTML=buildEditSelfPayHTML(fakeB);
}

function buildSlotOptions(date, selectedSlot, excludeId=null, overrideDocId=null){
  // 優先用 overrideDocId（換醫師後），否則從畫面上的選單讀，最後才從 booking 讀
  let docId = overrideDocId;
  if(!docId){
    const el=document.getElementById('e_doc');
    if(el&&el.value) docId=el.value;
  }
  if(!docId){
    const b2=bookings.find(x=>x.id===excludeId);
    docId=b2?b2.docId:null;
  }
  const doc=doctors.find(d=>String(d.id)===String(docId));

  // base: slots configured for this doctor on this date
  let configuredSlots=docId?getCommittedDocSlots(docId,date):[];

  // always include the original slot even if removed from settings
  if(selectedSlot && !configuredSlots.includes(selectedSlot)){
    configuredSlots=[...configuredSlots,selectedSlot].sort();
  }

  if(!configuredSlots.length){
    return `<option value="">— 該日無可用時段 —</option>`;
  }

  // count bookings excluding this patient to check limit correctly (same doctor only)
  const countExcludingSelf = (ds, slot) => {
    return bookings.filter(b=>
      b.date===ds && String(b.docId)===String(docId) && b.id!==excludeId &&
      (b.status==='pending'||b.status==='approved') &&
      isAM(b.slot)===isAM(slot)
    ).length;
  };

  return configuredSlots.map(s=>{
    // conflict: same date, same slot, same doctor, not self
    const conflict=bookings.find(b=>
      b.date===date && b.slot===s && String(b.docId)===String(docId) &&
      b.status!=='rejected' && b.id!==excludeId
    );
    const lim=doc?(isAM(s)?doc.limitAM??99:doc.limitPM??99):99;
    const limit=(lim===0||lim>0)?lim:99;
    const bookedCountExSelf=countExcludingSelf(date,s);
    const limitFull=bookedCountExSelf>=limit;
    const isOriginal=(s===selectedSlot);
    // 過去時段判斷（當天已過時間）
    const nowEdit=new Date();
    const todayEdit=nowEdit.toISOString().slice(0,10);
    let isSlotPast=false;
    if(date===todayEdit){
      const[hh,mm]=s.split(':').map(Number);
      const slotT=new Date(nowEdit.getFullYear(),nowEdit.getMonth(),nowEdit.getDate(),hh,mm,0,0);
      isSlotPast=slotT<=nowEdit;
    }
    const unavailable=conflict||(limitFull&&!isOriginal)||(isSlotPast&&!isOriginal);
    const disabled=unavailable?' disabled style="color:#ccc"':'';
    let label=s;
    if(conflict) label=`${s}（已預約）`;
    else if(limitFull&&!isOriginal) label=`${s}（額滿）`;
    else if(isSlotPast&&!isOriginal) label=`${s}（已過）`;
    return`<option value="${s}"${s===selectedSlot?' selected':''}${disabled}>${label}</option>`;
  }).join('');
}

  const date=document.getElementById('e_date').value;

/* on date change, update slot options using selected doctor's configured slots */
function onAddDateChange(){
  const date=(document.getElementById('a_date')?.value)||'';
  const docId=document.getElementById('a_doc').value||null;
  const slotSel=document.getElementById('a_slot');
  const doc=doctors.find(d=>String(d.id)===String(docId));

  if(!docId){
    slotSel.innerHTML=`<option value="">— 請先選擇醫師 —</option>`;
    document.getElementById('a_conflict').classList.remove('show');
    return;
  }

  let configured=getCommittedDocSlots(docId,date);
  // 過濾過去時段：若為今天，只保留未來時段
  const now=new Date();
  const todayStr=now.toISOString().slice(0,10);
  if(date===todayStr){
    configured=configured.filter(s=>{
      const[hh,mm]=s.split(':').map(Number);
      const t=new Date();t.setHours(hh,mm,0,0);
      return t>now;
    });
  }
  // 若日期小於今天，完全不允許
  if(date<todayStr){
    slotSel.innerHTML=`<option value="">— 不可選擇過去日期 —</option>`;
    document.getElementById('a_conflict').classList.remove('show');
    return;
  }
  if(!configured.length){
    slotSel.innerHTML=`<option value="">— 該日無可用時段 —</option>`;
    document.getElementById('a_conflict').classList.remove('show');
    return;
  }

  // 週上限檢查：達上限則不顯示時段
  if(doc&&doc.weekLimit>0){
    const dt2=new Date(date); const day2=dt2.getDay();
    const mon2=new Date(dt2); mon2.setDate(dt2.getDate()-(day2===0?6:day2-1));
    const weekKey2=mon2.toISOString().slice(0,10);
    const bookedDates2=new Set();
    Object.keys(slotSettings).forEach(k=>{
      const [did,kdate]=k.split(':');
      if(String(did)===String(docId)){
        const hasBk=bookings.some(b=>b.date===kdate&&String(b.docId)===String(docId)&&(b.status==='pending'||b.status==='approved'));
        if(hasBk){
          const dt3=new Date(kdate); const d3=dt3.getDay();
          const m3=new Date(dt3); m3.setDate(dt3.getDate()-(d3===0?6:d3-1));
          if(m3.toISOString().slice(0,10)===weekKey2) bookedDates2.add(kdate);
        }
      }
    });
    if(bookedDates2.size>=doc.weekLimit&&!bookedDates2.has(date)){
      slotSel.innerHTML=`<option value="">— 該日無可用時段 —</option>`;
      document.getElementById('a_conflict').classList.remove('show');
      return;
    }
  }

  slotSel.innerHTML=`<option value="">— 請選時段 —</option>`+configured.map(s=>{
    const conflict=bookings.find(b=>
      b.date===date && b.slot===s && String(b.docId)===String(docId) && b.status!=='rejected'
    );
    const limitFull=doc?isSlotLimitReached(doc,date,s):false;
    const unavailable=conflict||limitFull;
    const disabled=unavailable?' disabled style="color:#ccc"':'';
    let label=s;
    if(conflict) label=`${s}（已預約）`;
    else if(limitFull) label=`${s}（額滿）`;
    return`<option value="${s}"${disabled}>${label}</option>`;
  }).join('');
  document.getElementById('a_conflict').classList.remove('show');
}

function renderAddCal(){
  const y=addCalDate.getFullYear(), m=addCalDate.getMonth();
  const MN2=['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];
  const lbl=document.getElementById('addCalLbl');
  if(lbl) lbl.textContent=`${y} 年 ${MN2[m]}`;
  const grid=document.getElementById('addCalGrid');
  if(!grid) return;
  const docId=document.getElementById('a_doc')?.value||null;
  const first=new Date(y,m,1).getDay(), days=new Date(y,m+1,0).getDate();
  const now=new Date();
  const todayStr=now.toISOString().slice(0,10);
  const selDate=document.getElementById('a_date')?.value||'';
  let h='';
  for(let i=0;i<first;i++) h+=`<div class="acd other"></div>`;
  for(let dd=1;dd<=days;dd++){
    const ds=`${y}-${String(m+1).padStart(2,'0')}-${String(dd).padStart(2,'0')}`;
    const dt=new Date(y,m,dd);
    const dow=dt.getDay();
    // 取得該醫師該日時段
    let ss=docId?getCommittedDocSlots(docId,ds):[];
    // 今天：過濾已過時段
    if(ds===todayStr){
      ss=ss.filter(s=>{const[hh,mi]=s.split(':').map(Number);const t=new Date();t.setHours(hh,mi,0,0);return t>now;});
    }
    const isPast=ds<todayStr;
    const has=ss.length>0&&!isPast;
    // 額滿判斷
    let full=false;
    let wkClosed=false;
    const doc2=docId?doctors.find(d=>String(d.id)===String(docId)):null;
    if(has&&doc2){
      // session full check
      full=ss.every(slot=>{
        const amSlot=parseInt(slot)<12;
        const lim=amSlot?(doc2.limitAM??99):(doc2.limitPM??99);
        if(!lim||lim<=0)return false;
        const booked=bookings.filter(b=>
          String(b.docId)===String(docId)&&b.date===ds&&
          (b.status==='pending'||b.status==='approved')&&
          (parseInt(b.slot)<12)===amSlot
        ).length;
        return booked>=lim;
      });
      // week limit check
      if(!full && doc2.weekLimit>0){
        const dt2=new Date(ds); const day2=dt2.getDay();
        const mon2=new Date(dt2); mon2.setDate(dt2.getDate()-(day2===0?6:day2-1));
        const weekKey2=mon2.toISOString().slice(0,10);
        const bookedDates2=new Set();
        Object.keys(slotSettings).forEach(k=>{
          const [did,date]=k.split(':');
          if(String(did)===String(docId)){
            const hasBk=bookings.some(b=>b.date===date&&String(b.docId)===String(docId)&&(b.status==='pending'||b.status==='approved'));
            if(hasBk){
              const dt3=new Date(date); const d3=dt3.getDay();
              const m3=new Date(dt3); m3.setDate(dt3.getDate()-(d3===0?6:d3-1));
              if(m3.toISOString().slice(0,10)===weekKey2) bookedDates2.add(date);
            }
          }
        });
        if(bookedDates2.size>=doc2.weekLimit){
          const selfHas2=bookings.some(b=>b.date===ds&&String(b.docId)===String(docId)&&(b.status==='pending'||b.status==='approved'));
          wkClosed=!selfHas2;
        }
      }
    }
    const picked=ds===selDate;
    let cls='acd';
    if(dow===0)cls+=' sun'; if(dow===6)cls+=' sat';
    if(ds===todayStr) cls+=' today-marker';
    if(isPast) cls+=' past';
    else if(wkClosed) cls+=' noslot';
    else if(full) cls+=' full';
    else if(!has) cls+=' noslot';
    else cls+=' has';
    if(picked) cls+=' picked';
    const dot=(has&&!full&&!wkClosed)?`<div class="acd-dot"></div>`:'';
    const fullLbl=full?`<div class="acd-full-lbl">額滿</div>`:'';
    const click=(has&&!full&&!wkClosed)?`onclick="pickAddDate('${ds}')"`:'';
    h+=`<div class="${cls}" ${click}>${dd}${dot}${fullLbl}</div>`;
  }
  grid.innerHTML=h;
}

window.saveAddPatient = async function(){
  const name  = document.getElementById('a_name').value.trim();
  const phone = document.getElementById('a_phone').value.trim();
  const date  = (document.getElementById('a_date')?.value)||'';
  const slot  = document.getElementById('a_slot').value;
  const docId = document.getElementById('a_doc').value||null;
  const by=document.getElementById('a_bday_y').value.trim();
  const bm=document.getElementById('a_bday_m').value.trim();
  const bd=document.getElementById('a_bday_d').value.trim();
  const op=document.getElementById('a_op').value;

  // 顯示/隱藏錯誤訊息的輔助函數
  const showErr=(id,msg)=>{const el=document.getElementById(id);if(el){el.textContent=msg;el.style.display=msg?'block':'none';}};

  let ok=true;

  // 姓名
  if(!name){showErr('a_err_name','請輸入姓名');ok=false;}
  else showErr('a_err_name','');

  // 生日驗證
  const todayRoc=new Date().getFullYear()-1911;
  const yi=parseInt(by),mi2=parseInt(bm),di=parseInt(bd);
  let bdayErr='';
  if(!by||!bm||!bd||isNaN(yi)||isNaN(mi2)||isNaN(di)){
    bdayErr='請輸入完整生日';
  } else if(yi<1||yi>todayRoc){
    bdayErr=`民國年請填 1～${todayRoc}`;
  } else if(mi2<1||mi2>12){
    bdayErr='月份請填 1～12';
  } else {
    const maxD=new Date(yi+1911,mi2,0).getDate();
    if(di<1||di>maxD) bdayErr=`${mi2}月份日期請填 1～${maxD}`;
    else if(new Date(yi+1911,mi2-1,di)>new Date()) bdayErr='生日不能是未來日期';
  }
  showErr('a_err_bday',bdayErr);
  if(bdayErr) ok=false;

  // 電話
  if(!phone){showErr('a_err_phone','請輸入聯絡電話');ok=false;}
  else showErr('a_err_phone','');

  // 醫師
  if(!docId){showErr('a_err_doc','請選擇醫師');ok=false;}
  else showErr('a_err_doc','');

  // 術式
  if(!op){showErr('a_err_op','請選擇術式');ok=false;}
  else showErr('a_err_op','');

  // 日期 & 時段
  if(!date){toast('err','請選擇手術日期');ok=false;}
  if(date&&!slot){toast('err','請選擇手術時段');ok=false;}
  // 不允許過去日期或當天已過時段
  if(date&&slot){
    const nowA=new Date();
    const todayA=nowA.toISOString().slice(0,10);
    if(date<todayA){toast('err','不可選擇過去日期');ok=false;}
    else if(date===todayA){
      const[hh,mm]=slot.split(':').map(Number);
      const slotT=new Date(nowA.getFullYear(),nowA.getMonth(),nowA.getDate(),hh,mm,0,0);
      if(slotT<=nowA){toast('err','不可選擇已過的時段');ok=false;}
    }
  }

  // 驗證失敗時滾動到第一個錯誤欄位
  if(!ok){
    const errIds=['a_err_name','a_err_bday','a_err_phone','a_err_doc','a_err_op'];
    for(const eid of errIds){
      const el=document.getElementById(eid);
      if(el&&el.style.display!=='none'&&el.textContent){
        el.scrollIntoView({behavior:'smooth',block:'center'});
        break;
      }
    }
    return;
  }
  if(bookings.find(b=>b.date===date&&b.slot===slot&&String(b.docId)===String(docId)&&b.status!=='rejected')){toast('err','時段衝突，請更換時間');return;}
  const bday=composeBday(by,bm,bd);
  const docObj=doctors.find(d=>String(d.id)===String(docId));

  // 收集自費項目：必要 + 已勾選選填
  const selfPayResult=[];
  const opKey=docId+':'+op;
  const opCfg=opSelfPay[opKey]||{required:[],optional:[],customItems:[]};
  const customItems2=opCfg.customItems||[];
  // required
  opCfg.required.forEach(rid=>{
    const it=customItems2.find(x=>x.id===rid);
    if(it) selfPayResult.push({id:it.id,name:it.name,price:it.price,unit:it.unit||'',qty:1,role:'required'});
  });
  // optional checked
  opCfg.optional.forEach(oid=>{
    const cb=document.getElementById('addsp_cb_'+oid);
    if(cb&&cb.classList.contains('chk')){
      const it=customItems2.find(x=>x.id===oid);
      if(it){
        const qty=Math.max(1,parseInt(document.getElementById('addsp_qty_'+oid)?.value||1)||1);
        selfPayResult.push({id:it.id,name:it.name,price:it.price,unit:it.unit||'',qty,role:'optional'});
      }
    }
  });
  const data={
    caseNo:document.getElementById('a_caseNo').value.trim()||'',
    name, bday, phone, date, slot,
    op:document.getElementById('a_op').value,
    note:document.getElementById('a_note').value.trim(),
    docId, docName:docObj?docObj.name:'',
    status:'pending', lineNotified:false,
    selfPayItems: selfPayResult,
    createdAt:firebase.firestore.FieldValue.serverTimestamp()
  };
  const btn=document.getElementById('a_save_btn');
  if(btn){btn.disabled=true;btn.textContent='儲存中…';}
  try{
    if(window._fbAddBooking){
      await window._fbAddBooking(data);
    } else {
      // fallback: local only
      bookings.push({id:String(nextId++), ...data, ts:Date.now()});
      renderBookings();
    }
    closeModal();
    toast('success','新病人預約已建立並同步至雲端');
  } catch(e){
    toast('err','儲存失敗：'+e.message);
    if(btn){btn.disabled=false;btn.textContent='新增';}
  }
}

/* ═══════════════════════════════════════
   SLOT SETTINGS  (per-doctor tabs)
═══════════════════════════════════════ */
// slotSettings keys: "docId:YYYY-MM-DD" -> [slots]
let slotActiveDocId = null;
// 本地未儲存的時段變更，key 同 slotSettings
let localSlotChanges = {};

function getDocSlots(docId, ds){ return slotSettings[docId+':'+ds] || []; }
function getCommittedDocSlots(docId, ds){ return committedSlotSettings[docId+':'+ds] || []; }
function setDocSlots(docId, ds, arr){
  const k=docId+':'+ds;
  if(arr&&arr.length){
    slotSettings[k]=[...arr].sort();
    localSlotChanges[k]=[...arr].sort();
  } else {
    delete slotSettings[k];
    localSlotChanges[k]=[];  // 空陣列代表「此 key 需刪除」
  }
}
// 只查此醫師在此日的已預約時段（pending+approved）
function getDocBookedSlots(docId, ds){
  return bookings.filter(b=>
    b.date===ds &&
    String(b.docId)===String(docId) &&
    (b.status==='pending'||b.status==='approved')
  ).map(b=>b.slot);
}

// is slot AM (before 12:00)?
function isAM(slot){ return parseInt(slot.split(':')[0])<12; }

// count pending+approved bookings for a doctor on a date, split by AM/PM
function getDocBookedCount(docId, ds){
  const bks=bookings.filter(b=>b.date===ds&&String(b.docId)===String(docId)&&(b.status==='pending'||b.status==='approved'));
  return { am: bks.filter(b=>isAM(b.slot)).length, pm: bks.filter(b=>!isAM(b.slot)).length };
}

// get limit for a slot (AM or PM) from doctor settings
function getSlotLimit(doc, slot){
  if(!doc) return 99;
  const lim=isAM(slot)?doc.limitAM:doc.limitPM;
  return (lim===0||lim>0)?lim:99;
}

// is a given slot locked due to limit reached?
function isSlotLimitReached(doc, ds, slot){
  if(!doc) return false;
  const lim=isAM(slot)?doc.limitAM:doc.limitPM;
  const limit=(lim===0||lim>0)?lim:99;
  const counts=getDocBookedCount(doc.id, ds);
  return isAM(slot)?(counts.am>=limit):(counts.pm>=limit);
}
