function renderTimeSlotPanel(ds){
  if(!slotActiveDocId){document.getElementById('timeSlotPanel').innerHTML='<div class="no-date-hint">請先選擇醫師分頁</div>';return;}
  const now=new Date();
  const todayStr=now.toISOString().slice(0,10);
  const isPastDate=ds<todayStr;
  const isToday=ds===todayStr;
  const sel=getDocSlots(slotActiveDocId,ds);
  const booked=getDocBookedSlots(slotActiveDocId,ds);
  const dc=docColor(slotActiveDocId);
  const doc=doctors.find(d=>String(d.id)===String(slotActiveDocId));
  const counts=getDocBookedCount(slotActiveDocId,ds);
  const limitAM=doc?doc.limitAM||99:99;
  const limitPM=doc?doc.limitPM||99:99;
  const remAM=Math.max(0,limitAM-counts.am);
  const remPM=Math.max(0,limitPM-counts.pm);

  // Check week-limit closed for this day
  let isPanelWkClosed=false;
  if(doc&&doc.weekLimit>0){
    const dtP=new Date(ds); const dayP=dtP.getDay();
    const monP=new Date(dtP); monP.setDate(dtP.getDate()-(dayP===0?6:dayP-1));
    const weekKeyP=monP.toISOString().slice(0,10);
    const bookedDatesP=new Set();
    Object.entries(slotSettings).forEach(([k])=>{
      const [did,date]=k.split(':');
      if(String(did)===String(slotActiveDocId)){
        const hasBk=bookings.some(b=>b.date===date&&String(b.docId)===String(slotActiveDocId)&&(b.status==='pending'||b.status==='approved'));
        if(hasBk){
          const dt2=new Date(date); const d2=dt2.getDay();
          const m2=new Date(dt2); m2.setDate(dt2.getDate()-(d2===0?6:d2-1));
          if(m2.toISOString().slice(0,10)===weekKeyP) bookedDatesP.add(date);
        }
      }
    });
    if(bookedDatesP.size>=doc.weekLimit){
      const selfHasP=bookings.some(b=>b.date===ds&&String(b.docId)===String(slotActiveDocId)&&(b.status==='pending'||b.status==='approved'));
      isPanelWkClosed=!selfHasP;
    }
  }

  // helper: is a slot time already past (for today)?
  function isSlotTimePast(s){
    if(!isToday) return isPastDate;
    const [hh,mm]=s.split(':').map(Number);
    const slotTime=new Date(now.getFullYear(),now.getMonth(),now.getDate(),hh,mm,0,0);
    return slotTime<=now;
  }

  const slotItems=sel.map(s=>{
    const isBooked=booked.includes(s);
    const am=isAM(s);
    const lim=am?(doc?doc.limitAM??99:99):(doc?doc.limitPM??99:99);
    const limit=(lim===0||lim>0)?lim:99;
    const limitReached=am?(counts.am>=limit):(counts.pm>=limit);
    const isGrey=!isBooked&&(limitReached||isPanelWkClosed);
    const isExpired=isSlotTimePast(s); // 過去時段（含當天已過時間）

    let actionBtn;
    if(isBooked){
      // 有預約：無論過去現在，顯示「已預約」badge
      actionBtn=`<span class="dds-booked">已預約</span>`;
    } else if(isExpired){
      // 已過時間且無預約：可刪，顯示刪除鈕（灰色）
      actionBtn=`<button class="dds-del" onclick="removeDaySlotInline('${ds}','${s}')" style="opacity:.55;" title="刪除過去時段"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>`;
    } else {
      // 未來時段：正常刪除鈕
      actionBtn=`<button class="dds-del" onclick="removeDaySlotInline('${ds}','${s}')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>`;
    }

    // 過去時段文字加刪除線，灰色
    const timeStyle=isExpired&&!isBooked
      ? `color:var(--text3);text-decoration:line-through;`
      : `color:${isGrey?'var(--text3)':dc.dot};${isGrey?'text-decoration:line-through;':''}`;

    return `<div class="dds-item">
      <span class="dds-time" style="${timeStyle}">${s}</span>
      ${actionBtn}
    </div>`;
  }).join('');

  // 新增時段下拉：08-20 點，當天時已過的選項 disabled
  const nowH=now.getHours();
  const hourOpts=Array.from({length:13},(_,i)=>{
    const h=i+8;
    const hStr=String(h).padStart(2,'0');
    const disabled=(isToday && h<nowH)?' disabled':'';
    const disabledStyle=(isToday && h<nowH)?' style="color:#D8DCE3;"':'';
    return `<option value="${hStr}"${disabled}${disabledStyle}>${hStr}</option>`;
  }).join('');
  const minOpts=['00','15','30','45'].map(v=>`<option value="${v}">${v}</option>`).join('');

  // plain text AM/PM remaining — 0 = red, >0 = black
  const limAM=doc?doc.limitAM??99:99; const effLimAM=(limAM===0||limAM>0)?limAM:99;
  const limPM=doc?doc.limitPM??99:99; const effLimPM=(limPM===0||limPM>0)?limPM:99;
  // 過去日期且沒有任何人預約 → 強制顯示 0 人
  const allExpired=sel.length>0&&sel.every(s=>isSlotTimePast(s)&&!booked.includes(s));
  const rem2AM=(isPanelWkClosed||allExpired)?0:Math.max(0,effLimAM-counts.am);
  const rem2PM=(isPanelWkClosed||allExpired)?0:Math.max(0,effLimPM-counts.pm);
  const amTxt=effLimAM<99?`上午剩 <strong style="color:${(rem2AM===0||isPanelWkClosed||allExpired)?'var(--red)':'var(--text)'};">${rem2AM}</strong> 人`:'';
  const pmTxt=effLimPM<99?`下午剩 <strong style="color:${(rem2PM===0||isPanelWkClosed||allExpired)?'var(--red)':'var(--text)'};">${rem2PM}</strong> 人`:'';
  // 過去日期：即使 effLim 是 99（無限制），也強制顯示 0 人
  const amTxtPast=isPastDate?`上午剩 <strong style="color:var(--red);">0</strong> 人`:'';
  const pmTxtPast=isPastDate?`下午剩 <strong style="color:var(--red);">0</strong> 人`:'';
  const remText=isPastDate
    ? `<span style="font-size:12px;color:var(--text2);">${amTxtPast}　${pmTxtPast}</span>`
    : (amTxt||pmTxt)?`<span style="font-size:12px;color:var(--text2);">${[amTxt,pmTxt].filter(Boolean).join('　')}</span>`:'';

  document.getElementById('timeSlotPanel').innerHTML=`
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;">
      <span style="display:flex;align-items:center;gap:6px;font-size:12px;font-weight:700;color:${dc.text};">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" style="width:14px;height:14px;color:${dc.dot};"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
        ${fmtDate(ds)} 可預約時段
      </span>
      ${remText}
    </div>
    <div class="day-detail-slots" style="margin-bottom:12px;">${slotItems||'<div style="font-size:12px;color:var(--text3);padding:6px 0;">尚未設定時段</div>'}</div>
    ${isPastDate?'':`<div class="dds-add-row">
      <select class="dds-select" id="dds_h"><option value="">時</option>${hourOpts}</select>
      <span style="font-size:13px;color:var(--text2);font-weight:600;">:</span>
      <select class="dds-select" id="dds_m"><option value="">分</option>${minOpts}</select>
      <button class="dds-add-btn" style="background:${dc.dot};" onclick="addDaySlotInline('${ds}')">新增</button>
    </div>
    ${booked.length?`<div style="margin-top:8px;font-size:11px;color:var(--text3);"><span style="display:inline-block;width:10px;height:10px;background:#F1F5F9;border:1px solid var(--border);border-radius:3px;margin-right:4px;"></span>灰色標記時段已有預約，不可刪除</div>`:''}`}`;
}

window.addDaySlotInline = function(ds){
  const now=new Date();
  const todayStr=now.toISOString().slice(0,10);
  if(ds<todayStr){toast('warn','過去日期不可新增時段');return;}
  const h=document.getElementById('dds_h').value;
  const min=document.getElementById('dds_m').value;
  if(!h||min===''){toast('warn','請選擇時與分');return;}
  const slot=h+':'+min;
  // 當天：檢查時段是否已過
  if(ds===todayStr){
    const[hh,mm]=slot.split(':').map(Number);
    const slotTime=new Date(now.getFullYear(),now.getMonth(),now.getDate(),hh,mm,0,0);
    if(slotTime<=now){toast('warn','不能新增已過的時段');return;}
  }
  const doc=doctors.find(d=>String(d.id)===String(slotActiveDocId));
  // only block if limit is explicitly set to 0 (not open)
  if(doc){
    const lim=isAM(slot)?doc.limitAM:doc.limitPM;
    if(lim===0){
      toast('warn',(isAM(slot)?'上午':'下午')+'人數上限設為 0，無法新增時段');
      return;
    }
  }
  const cur=getDocSlots(slotActiveDocId,ds);
  if(cur.includes(slot)){toast('warn','此時段已存在');return;}
  setDocSlots(slotActiveDocId,ds,[...cur,slot]);
  renderSlotCal();
  toast('success','已新增 '+slot);
}

window.removeDaySlotInline = function(ds,slot){
  if(getDocBookedSlots(slotActiveDocId,ds).includes(slot)){toast('warn','此時段已有預約，無法刪除');return;}
  setDocSlots(slotActiveDocId,ds,getDocSlots(slotActiveDocId,ds).filter(s=>s!==slot));
  renderSlotCal();
}

function renderSlotSummary(){
  const prefix=`${slotCalDate.getFullYear()}-${String(slotCalDate.getMonth()+1).padStart(2,'0')}`;
  const div=document.getElementById('slotSummary');
  if(!div)return;
  if(!slotActiveDocId){div.innerHTML='';return;}
  const dc=docColor(slotActiveDocId);
  const entries=Object.entries(slotSettings)
    .filter(([k])=>k.startsWith(slotActiveDocId+':'+prefix))
    .map(([k,slots])=>[k.split(':')[1],slots])
    .sort(([a],[b])=>a.localeCompare(b));
  if(!entries.length){div.innerHTML=`<div style="font-size:12px;color:var(--text3);padding:14px 0;">本月尚未設定任何時段</div>`;return;}
  const doc2=doctors.find(d=>String(d.id)===String(slotActiveDocId));
  const wkBadge=doc2&&doc2.weekLimit?`<span style="font-size:12px;color:var(--text2);">每週上限 <strong style="color:var(--red);">${doc2.weekLimit}</strong> 天</span>`:'';
  div.innerHTML=`<div class="slot-summary-sticky-hd">
    <div style="display:flex;align-items:center;justify-content:space-between;">
      <span style="font-size:12px;font-weight:700;color:var(--text2);">本月已設定時段</span>
      ${wkBadge}
    </div>
  </div>`+entries.map(([ds,slots])=>{
    const booked=getDocBookedSlots(slotActiveDocId,ds);
    const isSelected=ds===slotSelectedDay;
    const doc=doctors.find(d=>String(d.id)===String(slotActiveDocId));

    // Check if this day is week-limit-closed (all slots blocked by week cap)
    const isWkClosed = (()=>{
      if(!doc||!doc.weekLimit||doc.weekLimit<=0) return false;
      // get week key (Mon-based)
      const dt=new Date(ds); const day=dt.getDay();
      const mon=new Date(dt); mon.setDate(dt.getDate()-(day===0?6:day-1));
      const weekKey=mon.toISOString().slice(0,10);
      // count distinct days with bookings (pending/approved) in same week
      const bookedDates=new Set();
      Object.entries(slotSettings).forEach(([k])=>{
        const [did,date]=k.split(':');
        if(String(did)===String(slotActiveDocId)){
          const hasBk=bookings.some(b=>b.date===date&&String(b.docId)===String(slotActiveDocId)&&(b.status==='pending'||b.status==='approved'));
          if(hasBk){
            const dt2=new Date(date); const d2=dt2.getDay();
            const m2=new Date(dt2); m2.setDate(dt2.getDate()-(d2===0?6:d2-1));
            if(m2.toISOString().slice(0,10)===weekKey) bookedDates.add(date);
          }
        }
      });
      if(bookedDates.size<doc.weekLimit) return false;
      // If this day itself has bookings it's not closed
      const selfHasBooking=bookings.some(b=>b.date===ds&&String(b.docId)===String(slotActiveDocId)&&(b.status==='pending'||b.status==='approved'));
      return !selfHasBooking;
    })();

    const chipsHtml=slots.map(s=>{
      const isBooked=booked.includes(s);
      const limitFull=isSlotLimitReached(doc,ds,s);
      const nowR=new Date();
      const todayStrR=nowR.toISOString().slice(0,10);
      const isStrictPast=ds<todayStrR;
      const isTodayR=ds===todayStrR;
      let isPastSlot=isStrictPast;
      if(!isPastSlot&&isTodayR&&!isBooked){
        const[hh,mm]=s.split(':').map(Number);
        const slotT=new Date(nowR.getFullYear(),nowR.getMonth(),nowR.getDate(),hh,mm,0,0);
        isPastSlot=slotT<=nowR;
      }
      if(isBooked){
        // 已被預約：醫師顏色底、白色字（過去現在都一樣）
        return `<span class="slot-summary-chip" style="background:${dc.dot};color:#fff;border-color:${dc.dot};">${s}</span>`;
      } else if(isPastSlot){
        // 過去日期且無預約：灰色刪除線，可刪
        return `<span class="slot-summary-chip" style="color:var(--text3);text-decoration:line-through;background:#F1F5F9;border-color:var(--border);">${s}</span>`;
      } else if(isWkClosed || limitFull){
        // week-limit closed or capacity full: grey strikethrough
        return `<span class="slot-summary-chip wk-closed">${s}</span>`;
      } else {
        // available: doctor color
        return `<span class="slot-summary-chip" style="background:${dc.bg};color:${dc.text};border-color:${dc.border};">${s}</span>`;
      }
    }).join('');

    const nowPS=new Date();
    const todayStrPS=nowPS.toISOString().slice(0,10);
    const isPastSummary=ds<todayStrPS;
    // 今天所有無預約時段都已過 → 也視為「過期」（日期變灰）
    const isTodayPS=ds===todayStrPS;
    const allSlotsExpiredToday=isTodayPS&&slots.every(s=>{
      if(booked.includes(s)) return false;
      const[hh,mm]=s.split(':').map(Number);
      const t=new Date(nowPS.getFullYear(),nowPS.getMonth(),nowPS.getDate(),hh,mm,0,0);
      return t<=nowPS;
    });
    const isEffectivelyPast=isPastSummary||allSlotsExpiredToday;
    // 過去日期：只要有無預約的時段就顯示 × 鈕
    const hasDeletable=slots.some(s=>!booked.includes(s));
    const showDelBtn=!isEffectivelyPast||(isEffectivelyPast&&hasDeletable);
    return `<div class="slot-summary-item${isSelected?' summary-active':''}" onclick="selectSlotDay('${ds}')" style="cursor:pointer;${isSelected?`border-color:${dc.dot};background:${dc.bg};`:''}">
      <div style="min-width:80px;">
        <div class="slot-summary-date" style="${isSelected?`color:${dc.text};`:''}${isEffectivelyPast?'color:var(--text3);':''}">${fmtDate(ds)}</div>
      </div>
      <div class="slot-summary-chips">${chipsHtml}</div>
      ${showDelBtn?`<button class="slot-summary-del" onclick="event.stopPropagation();clearDocSlots('${ds}')" title="清除所有可刪時段" style="${isEffectivelyPast?'opacity:.55;':''}"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>`:''}
    </div>`;
  }).join('');
}

function removeSummarySlot(ds, slot){
  const booked=getDocBookedSlots(slotActiveDocId,ds);
  if(booked.includes(slot)){toast('warn','此時段已有預約，無法刪除');return;}
  setDocSlots(slotActiveDocId,ds,getDocSlots(slotActiveDocId,ds).filter(s=>s!==slot));
  renderSlotCal();
}

function clearDocSlots(ds){
  // only protect slots with pending or approved bookings for this doctor; rejected slots can be cleared
  const protected_slots=bookings
    .filter(b=>b.date===ds&&String(b.docId)===String(slotActiveDocId)&&(b.status==='pending'||b.status==='approved'))
    .map(b=>b.slot);
  setDocSlots(slotActiveDocId,ds,getDocSlots(slotActiveDocId,ds).filter(s=>protected_slots.includes(s)));
  renderSlotCal();
}

/* Global time settings */
let doctorDefaultSlots={};
let globalSettingDocId=null;

window.openGlobalTimeSettings = function(){
  if(!slotActiveDocId){toast('warn','請先選擇醫師分頁');return;}
  globalSettingDocId=slotActiveDocId;
  const doc=doctors.find(d=>d.id===globalSettingDocId);

    <button class="mbtn mbtn-close" onclick="closeModal2()">取消</button>
  </div>`;

}

function renderGlobalTimeBody(){
  const DOW=['日','一','二','三','四','五','六'];
  const cfg=doctorDefaultSlots[globalSettingDocId]||{days:[],slots:[]};
  const dc=docColor(globalSettingDocId);

  const dowChips=DOW.map((l,i)=>{
    const active=cfg.days.includes(i);

      style="${active?`background:${dc.bg};color:${dc.text};border-color:${dc.dot};`:'background:var(--white);color:var(--text2);border-color:var(--border);'}"
      onclick="toggleGlobalDay(${i})"
      data-dow="${i}">週${l}</button>`;
  }).join('');

  const slotChips=cfg.slots.map((s,i)=>`<div class="global-slot-row"><span class="global-slot-time">${s}</span><button class="global-slot-del" onclick="delGlobalSlot(${i})"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button></div>`).join('');

  const hourOpts=Array.from({length:13},(_,i)=>{const h=i+8;const hStr=String(h).padStart(2,'0');return`<option value="${hStr}">${hStr}</option>`;}).join('');
  const minOpts=['00','15','30','45'].map(v=>`<option value="${v}">${v}</option>`).join('');

  document.getElementById('modal2Body').innerHTML=`
    <div style="font-size:11px;font-weight:700;color:var(--text2);margin:0 0 8px;">套用星期</div>
    <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px;">${dowChips}</div>
    <div style="font-size:11px;font-weight:700;color:var(--text2);margin-bottom:8px;">預設開放時段</div>
    <div class="global-slots-wrap" style="margin-bottom:10px;">${slotChips||'<div style="font-size:12px;color:var(--text3);">尚未設定</div>'}</div>
    <div class="dds-add-row">
      <select class="dds-select" id="gs_h"><option value="">時</option>${hourOpts}</select>
      <span style="font-size:13px;color:var(--text2);font-weight:600;">:</span>
      <select class="dds-select" id="gs_m"><option value="">分</option>${minOpts}</select>
      <button class="dds-add-btn" onclick="addGlobalSlot()">新增</button>
    </div>`;
}

window.toggleGlobalDay = function(d){
  if(!doctorDefaultSlots[globalSettingDocId]) doctorDefaultSlots[globalSettingDocId]={days:[],slots:[]};
  const days=doctorDefaultSlots[globalSettingDocId].days;
  const idx=days.indexOf(d); if(idx>=0) days.splice(idx,1); else days.push(d);
  renderGlobalTimeBody();
}

window.addGlobalSlot = function(){
  const h=document.getElementById('gs_h').value,min=document.getElementById('gs_m').value;
  if(!h||min===''){toast('warn','請選擇時與分');return;}
  const slot=h+':'+min;
  const doc=doctors.find(d=>d.id===globalSettingDocId);
  if(doc){
    const am=parseInt(h)<12;
    if(am && doc.limitAM===0){toast('warn','該醫師上午人數上限為 0，無法新增上午時段');return;}
    if(!am && doc.limitPM===0){toast('warn','該醫師下午人數上限為 0，無法新增下午時段');return;}
  }
  if(!doctorDefaultSlots[globalSettingDocId]) doctorDefaultSlots[globalSettingDocId]={days:[],slots:[]};
  const arr=doctorDefaultSlots[globalSettingDocId].slots;
  if(arr.includes(slot)){toast('warn','已存在');return;}
  arr.push(slot);arr.sort();renderGlobalTimeBody();
}

window.delGlobalSlot = function(i){
  doctorDefaultSlots[globalSettingDocId].slots.splice(i,1);renderGlobalTimeBody();
}

window.applyGlobalSettings = function(){
  if(!globalSettingDocId){toast('warn','請選擇醫師');return;}
  const cfg=doctorDefaultSlots[globalSettingDocId];
  if(!cfg||!cfg.days.length||!cfg.slots.length){toast('warn','請設定星期和時段');return;}
  const doc=doctors.find(d=>d.id===globalSettingDocId);
  // filter out slots blocked by limit=0
  const allowedSlots=cfg.slots.filter(s=>{
    const am=isAM(s);
    if(am && doc && doc.limitAM===0) return false;
    if(!am && doc && doc.limitPM===0) return false;
    return true;
  });
  if(!allowedSlots.length){toast('warn','所有時段皆因人數上限為 0 而無法套用');return;}
  const y=slotCalDate.getFullYear(),m=slotCalDate.getMonth();
  const days=new Date(y,m+1,0).getDate(); let count=0;
  for(let d=1;d<=days;d++){
    const dt=new Date(y,m,d);
    if(!cfg.days.includes(dt.getDay())) continue;
    const ds=`${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const booked=getDocBookedSlots(globalSettingDocId,ds);
    const cur=getDocSlots(globalSettingDocId,ds);
    const merged=[...new Set([...cur,...allowedSlots])].filter(s=>!booked.includes(s)||cur.includes(s));
    setDocSlots(globalSettingDocId,ds,merged); count++;
  }
  if(globalSettingDocId===slotActiveDocId) renderSlotCal();
  closeModal2(); toast('success',`已套用到本月 ${count} 天`);
}

function openOverlay2(){document.getElementById('overlay2').classList.add('open');}
window.closeModal2 = function(){document.getElementById('overlay2').classList.remove('open');}
window.closeOverlay2 = function(e){if(e.target===document.getElementById('overlay2'))closeModal2();}

window.opsInlineSyncName = function(inp){

window.opsInlineSyncDesc = function(inp){

  if(window._opsInlineDraft[i]) window._opsInlineDraft[i].desc=inp.value.trim();
}
window.opsInlineAdd = function(){
  // sync current DOM values before re-render
  document.querySelectorAll('.opsed-name').forEach(el=>{
    const i=parseInt(el.dataset.idx);
    if(window._opsInlineDraft[i]!==undefined) window._opsInlineDraft[i].name=el.value.trim();
  });
  document.querySelectorAll('.opsed-desc').forEach(el=>{
    const i=parseInt(el.dataset.idx);
    if(window._opsInlineDraft[i]!==undefined) window._opsInlineDraft[i].desc=el.value.trim();
  });
  window._opsInlineDraft.push({name:'',desc:''});
  _renderOpsList(window._opsInlineDraft);
  // focus last name input
  const names=document.querySelectorAll('.opsed-name');
  if(names.length) names[names.length-1].focus();
}
window.opsInlineDelete = function(idx){
  // sync DOM first
  document.querySelectorAll('.opsed-name').forEach(el=>{
    const i=parseInt(el.dataset.idx);
    if(window._opsInlineDraft[i]!==undefined) window._opsInlineDraft[i].name=el.value.trim();
  });
  document.querySelectorAll('.opsed-desc').forEach(el=>{
    const i=parseInt(el.dataset.idx);
    if(window._opsInlineDraft[i]!==undefined) window._opsInlineDraft[i].desc=el.value.trim();
  });
  window._opsInlineDraft.splice(idx,1);
  _renderOpsList(window._opsInlineDraft);
}

function _getOpsItems(){
  // read current state from DOM (read-only list in doctor modal)
  const wrap=document.getElementById('opsListWrap');
  if(!wrap) return [];
  const rows=wrap.querySelectorAll('.ops-item');
  const items=[];
  rows.forEach(row=>{
    const nameEl=row.querySelector('.ops-item-name');
    const descEl=row.querySelector('.ops-item-desc');
    const name=nameEl?nameEl.textContent.trim():'';
    const desc=descEl?descEl.textContent.trim():'';
    if(name) items.push({name,desc});
  });
  return items;
}

function getSelectedOps(){
  // sync latest DOM values into draft first
  document.querySelectorAll('.opsed-name').forEach(el=>{
    const i=parseInt(el.dataset.idx);
    if(window._opsInlineDraft&&window._opsInlineDraft[i]!==undefined)
      window._opsInlineDraft[i].name=el.value.trim();
  });
  document.querySelectorAll('.opsed-desc').forEach(el=>{
    const i=parseInt(el.dataset.idx);
    if(window._opsInlineDraft&&window._opsInlineDraft[i]!==undefined)
      window._opsInlineDraft[i].desc=el.value.trim();
  });
  return (window._opsInlineDraft||[]).filter(x=>x.name);
}

/* Auto-populate opSelfPay for a doctor's ops from selfPayItems defaults */
function autoPopulateOpSelfPay(docId, ops){
  if(!ops||!ops.length||!selfPayItems.length) return;
  ops.forEach(function(opObj){
    const op=typeof opObj==='object'?opObj.name:opObj;
    const key=docId+':'+op;
    if(!opSelfPay[key]){
      // Brand new op: copy all default items in (required=[],optional=[all items])
      opSelfPay[key]={
        required:[],
        optional:selfPayItems.map(function(it){return it.id;})
      };
      if(window._fbSaveOpSelfPay) window._fbSaveOpSelfPay(key, opSelfPay[key]);
    }
  });
}

window.saveAddDoctor = async function(){
  const name=document.getElementById('dc_name').value.trim();
  if(!name){toast('err','請填寫醫師姓名');return;}
  const ops=getSelectedOps();
  const colorId=document.getElementById('dc_colorId').value||'c1';
  const limitAM=parseInt(document.getElementById('dc_limit_am').value)??3;
  const limitPM=parseInt(document.getElementById('dc_limit_pm').value)??3;
  const weekLimitOn=document.getElementById('dc_week_limit_on')?.checked;
  const weekLimit=weekLimitOn?parseInt(document.getElementById('dc_week_limit').value)||0:0;
  const newId='doc_'+Math.random().toString(36).slice(2,10)+(Date.now()%10000);
  const newDoc={id:newId,name,title:document.getElementById('dc_title').value.trim()||'耳鼻喉科',colorId,limitAM,limitPM,weekLimit,ops};
  const btn=document.querySelector('#modal .mbtn-approve');
  if(btn){btn.disabled=true;btn.textContent='新增中…';}
  try{
    if(window._fbSaveDoctor){
      await window._fbSaveDoctor(newDoc);
    } else {
      doctors.push(newDoc);
      renderDoctors();
    }
    closeModal();
    toast('success',`${name} 醫師已新增`);
  }catch(e){
    toast('err','儲存失敗：'+e.message);
    if(btn){btn.disabled=false;btn.textContent='新增';}
  }
}

window.saveEditDoctor = async function(id){
  const doc=doctors.find(d=>String(d.id)===String(id));if(!doc)return;
  doc.name=document.getElementById('dc_name').value.trim()||doc.name;
  doc.title=document.getElementById('dc_title').value.trim()||doc.title;

window.deleteDoctor = function(id){
  const doc=doctors.find(d=>String(d.id)===String(id));if(!doc)return;
  if(!confirm(`確定要刪除 ${doc.name} 醫師？\n\n該醫師的所有預約時段設定與自費項目清單設定也將一併刪除。`))return;
  const prefix=String(id)+':';
  // 清除記憶體中的 slotSettings
  Object.keys(slotSettings).forEach(k=>{if(k.startsWith(prefix)) delete slotSettings[k];});
  Object.keys(localSlotChanges).forEach(k=>{if(k.startsWith(prefix)) delete localSlotChanges[k];});
  // 清除記憶體中的 opSelfPay
  Object.keys(opSelfPay).forEach(k=>{if(k.startsWith(prefix)) delete opSelfPay[k];});
  if(window._fbDeleteDoctorSlots) window._fbDeleteDoctorSlots(id);
  if(window._fbDeleteDoctorOpSettings) window._fbDeleteDoctorOpSettings(id);
  if(window._fbDeleteDoctor) window._fbDeleteDoctor(id);
  doctors=doctors.filter(d=>String(d.id)!==String(id));
  if(String(slotActiveDocId)===String(id)) slotActiveDocId=null;
  renderDoctors();
  if(document.getElementById('panel-schedule').classList.contains('active')) renderSlotCal();
  toast('warn','醫師已刪除');
}

function renderReview(){
  // default to first doctor if none selected
  if(reviewActiveDocId===null && doctors.length) reviewActiveDocId=doctors[0].id;
  renderReviewDocTabs();

  const t=document.getElementById('reviewTable');
  if(!doctors.length){ t.innerHTML=''; return; }

  let data=bookings.filter(b=>{
    if(b.status!=='pending') return false;
    if(String(b.docId)!==String(reviewActiveDocId)) return false;
    // 只顯示今天及未來的待審核預約
    const todayStr=new Date().toISOString().slice(0,10);
    if(b.date<todayStr) return false;
    return true;
  });
  data.sort((a,b)=>a.date.localeCompare(b.date)||a.slot.localeCompare(b.slot));

  const dc=docColor(reviewActiveDocId);
  const unlocked=String(reviewUnlockedDocId)===String(reviewActiveDocId);

  // inject hover color CSS var into the table wrapper
  const wrap=document.getElementById('panel-review');
  if(wrap){
    wrap.style.setProperty('--rev-hover-bg', dc.bg);
    wrap.style.setProperty('--rev-hover-border', dc.border);
  }

  if(!data.length){

  if(!spActiveDocId) spActiveDocId=doctors[0]?.id;
  const d=doctors.find(x=>String(x.id)===String(spActiveDocId));

    const customItems=(cfg.customItems||[]);

          <td style="padding:5px 0;text-align:right;color:var(--text2);white-space:nowrap;font-variant-numeric:tabular-nums;">$${price}${unit}</td>

        const unit=it.unit?`/${it.unit}`:'';
        html+=`<tr style="border-bottom:1px solid #F1F5F9;">
          <td style="padding:5px 4px 5px 0;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${it.name}</td>

        </tr>`;
      });
      html+='</table>';
    }
    html+='</div></div>';
  });
  html+='</div>';
  div.innerHTML=html;

window.openOpSelfPayEditor = function(docId, opName){
  const key=docId+':'+opName;
  if(!opSelfPay[key]) opSelfPay[key]={required:[],optional:[],customItems:[]};
  // deep clone for local editing (cancel = discard)
  const snapshot=JSON.parse(JSON.stringify(opSelfPay[key]));
  let draft=JSON.parse(JSON.stringify(snapshot));
  if(!draft.customItems) draft.customItems=[];

  // drag state
  let dragIdx=null;

  function allItems(){
    // ordered: required first, then optional
    const req=(draft.required||[]).map(id=>{const it=(draft.customItems||[]).find(x=>x.id===id);return it?{...it,role:'required'}:null;}).filter(Boolean);
    const opt=(draft.optional||[]).map(id=>{const it=(draft.customItems||[]).find(x=>x.id===id);return it?{...it,role:'optional'}:null;}).filter(Boolean);
    return [...req,...opt];
  }

  function reorderFromList(items){
    draft.required=items.filter(x=>x.role==='required').map(x=>x.id);
    draft.optional=items.filter(x=>x.role==='optional').map(x=>x.id);
  }

  function renderEditorBody(){
    const items=allItems();
    let rows='';
    items.forEach((it,i)=>{
      const priceStr=it.unit?`$${parseInt(it.price).toLocaleString()}/${it.unit}`:`$${parseInt(it.price).toLocaleString()}`;
      const isReq=it.role==='required';
      rows+=`<div class="sp-drag-row" data-idx="${i}" style="display:flex;align-items:center;gap:8px;padding:9px 10px;border-bottom:1px solid #F1F5F9;background:white;user-select:none;">
        <div class="sp-drag-handle" style="width:20px;flex-shrink:0;color:var(--text3);cursor:grab;display:flex;align-items:center;">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" style="width:14px;height:14px;"><line x1="4" y1="8" x2="20" y2="8"/><line x1="4" y1="12" x2="20" y2="12"/><line x1="4" y1="16" x2="20" y2="16"/></svg>
        </div>
        <div style="flex:1;min-width:0;font-size:13px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${it.name}${isReq?' <span style="color:var(--red);font-size:10px;">*</span>':''}</div>
        <div style="width:90px;flex-shrink:0;font-size:12px;color:var(--text2);text-align:right;">${priceStr}</div>
        <select data-item-id="${it.id}" class="sp-role-sel" style="width:72px;flex-shrink:0;padding:4px 6px;border:1.5px solid var(--border);border-radius:var(--rx);font-size:12px;outline:none;">
          <option value="required"${isReq?' selected':''}>必要</option>
          <option value="optional"${!isReq?' selected':''}>選填</option>
        </select>
        <button class="icon-btn ib-del" data-del-id="${it.id}" style="width:26px;height:26px;flex-shrink:0;">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" style="width:11px;height:11px;"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>`;
    });

    document.getElementById('op_editor_body').innerHTML=`
      <div style="background:#F8FAFC;border:1px solid var(--border);border-radius:var(--rx);padding:12px 14px;margin-bottom:14px;">
        <div style="font-size:11px;font-weight:700;color:var(--text2);margin-bottom:10px;">新增項目</div>
        <div style="display:grid;grid-template-columns:1fr 80px 70px auto auto;gap:6px;align-items:center;">
          <input class="edit-inp" id="op_ci_name" placeholder="項目名稱" style="padding:6px 10px;font-size:13px;">
          <input class="edit-inp" id="op_ci_price" type="number" min="0" placeholder="單價" style="padding:6px 10px;font-size:13px;text-align:center;">
          <input class="edit-inp" id="op_ci_unit" placeholder="單位" style="padding:6px 10px;font-size:13px;text-align:center;">
          <select id="op_ci_role" style="padding:6px 8px;border:1.5px solid var(--border);border-radius:var(--rx);font-size:12px;outline:none;">
            <option value="optional">選填</option><option value="required">必要</option>
          </select>
          <button class="tb-btn primary" id="op_ci_add_btn" style="padding:6px 12px;white-space:nowrap;">新增</button>
        </div>
      </div>
      <div style="border:1.5px solid var(--border);border-radius:var(--rx);overflow:hidden;margin-bottom:4px;">
        <div style="display:flex;align-items:center;gap:8px;padding:7px 10px;background:#F8FAFC;border-bottom:2px solid var(--border);">
          <div style="width:20px;flex-shrink:0;"></div>
          <div style="flex:1;font-size:11px;font-weight:700;color:var(--text2);">項目名稱</div>
          <div style="width:90px;flex-shrink:0;font-size:11px;font-weight:700;color:var(--text2);text-align:right;">單價</div>
          <div style="width:72px;flex-shrink:0;font-size:11px;font-weight:700;color:var(--text2);">必要/選填</div>
          <div style="width:26px;flex-shrink:0;"></div>
        </div>
        <div id="sp_drag_tbody">${rows||'<div style="padding:16px;text-align:center;color:var(--text3);font-size:12px;">尚未加入任何項目</div>'}</div>
      </div>`;

    // bind events
    document.getElementById('op_ci_add_btn')?.addEventListener('click',function(){
      const name=document.getElementById('op_ci_name')?.value.trim();
      const price=parseInt(document.getElementById('op_ci_price')?.value)||0;
      const unit=document.getElementById('op_ci_unit')?.value.trim()||'';
      const role=document.getElementById('op_ci_role')?.value||'optional';
      if(!name){toast('warn','請輸入項目名稱');return;}
      if(!price||price<0){toast('warn','請輸入有效金額（不可為負）');return;}
      const newId='ci_'+Date.now();
      draft.customItems.push({id:newId,name,price,unit});
      if(role==='required') draft.required.push(newId);
      else draft.optional.push(newId);
      renderEditorBody();
    });

    // role change
    document.querySelectorAll('.sp-role-sel').forEach(sel=>{
      sel.addEventListener('change',function(){
        const id=this.dataset.itemId;
        const role=this.value;
        draft.required=(draft.required||[]).filter(x=>x!==id);
        draft.optional=(draft.optional||[]).filter(x=>x!==id);
        if(role==='required') draft.required.push(id);
        else draft.optional.push(id);
        renderEditorBody();
      });
    });

    // delete
    document.querySelectorAll('[data-del-id]').forEach(btn=>{
      btn.addEventListener('click',function(){
        const id=this.dataset.delId;
        draft.required=(draft.required||[]).filter(x=>x!==id);
        draft.optional=(draft.optional||[]).filter(x=>x!==id);
        draft.customItems=(draft.customItems||[]).filter(x=>x.id!==id);
        renderEditorBody();
      });
    });

    // drag and drop via SortableJS
    const tbody=document.getElementById('sp_drag_tbody');
    if(tbody && window.Sortable){
      window._spSortable && window._spSortable.destroy();
      window._spSortable = new Sortable(tbody, {
        animation: 150,
        handle: '.sp-drag-handle',
        ghostClass: 'sp-drag-ghost',
        chosenClass: 'sp-drag-chosen',
        dragClass: 'sp-drag-active',
        forceFallback: false,
        onEnd: function(evt){
          const items=allItems();
          const [moved]=items.splice(evt.oldIndex,1);
          items.splice(evt.newIndex,0,moved);
          reorderFromList(items);
          renderEditorBody();
        }
      });
    }
  }

  document.getElementById('modal2Title').textContent=`${opName}－$自費設定`;
  document.getElementById('modal2Body').innerHTML=`<div id="op_editor_body"></div>`;
  document.getElementById('modal2Foot').innerHTML=`<div class="modal-acts">
    <button class="mbtn mbtn-approve" id="sp_save_btn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="20 6 9 17 4 12"/></svg>儲存</button>
    <button class="mbtn mbtn-close" id="sp_cancel_btn">取消</button>
  </div>`;

  document.getElementById('sp_save_btn').addEventListener('click',function(){
    opSelfPay[key]=draft;
    if(window._fbSaveOpSelfPay) window._fbSaveOpSelfPay(key, draft);
    closeModal2();
    renderOpSelfPaySettings();
    toast('success','術式自費設定已儲存');
  });
  document.getElementById('sp_cancel_btn').addEventListener('click',function(){
    // restore snapshot — discard all changes
    opSelfPay[key]=JSON.parse(JSON.stringify(snapshot));
    closeModal2();
  });

  renderEditorBody();
  openOverlay2();
};

window.confirmSpPicker = function(){
  const items=[];
  selfPayItems.forEach(it=>{
    const cb=document.getElementById('spcb_'+it.id);
    if(cb&&cb.classList.contains('chk')){
      const qtyEl=document.getElementById('sppq_'+it.id);
      const qty=Math.max(1,parseInt(qtyEl?qtyEl.value:1)||1);
      items.push({id:it.id,name:it.name,price:it.price,unit:it.unit,qty});
    }
  });
  window._pendingSelfPayItems=items;
  const preview=document.getElementById('a_selfpay_preview');
  if(preview){
    if(items.length){
      const total=items.reduce((s,x)=>s+x.price*x.qty,0);
      let html='<div style="background:var(--op);border:1px solid var(--ob);border-radius:var(--rx);padding:10px 12px;">';
      items.forEach(x=>{ html+=`<div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px;"><span>${x.name} x ${x.qty}</span><span style="font-weight:700;">$${(x.price*x.qty).toLocaleString()}</span></div>`; });
      html+=`<div style="border-top:1px solid var(--ob);margin-top:6px;padding-top:6px;display:flex;justify-content:space-between;font-size:13px;font-weight:700;"><span>合計</span><span style="color:var(--orange);">$${total.toLocaleString()}</span></div></div>`;
      preview.innerHTML=html;
    } else { preview.innerHTML=''; }
  }
  closeModal2();
  toast('success',items.length?('已選擇 '+items.length+' 項自費項目'):'已清除自費項目');
}

      await auth.signOut();

      document.getElementById('mainContent').style.display='none';

  // ── 使用者管理 ──
  let _umUsers=[];

  window.renderUserList = function(){
    const list=document.getElementById('umList');
    if(!list)return;
    if(!_umUsers.length){
      list.innerHTML='<div style="padding:20px;text-align:center;color:var(--text3);font-size:13px;">尚未設定任何使用者</div>';
      return;
    }

      const isSelf=u.email===window._currentUserEmail;
      return `<div class="um-row${isSelf?' um-self':''}">
        <span class="um-email">${u.email}${isSelf?' <span style="font-size:11px;color:var(--orange);">（我）</span>':''}</span>

          u.active
            ?`<button class="tb-btn" style="padding:4px 10px;font-size:12px;" onclick="setUserActive('${u.email}',false)">停用</button>`
            :`<button class="tb-btn" style="padding:4px 10px;font-size:12px;color:var(--green);border-color:var(--gb);" onclick="setUserActive('${u.email}',true)">啟用</button>`

        ${isSelf?'':`<button class="icon-btn ib-del" style="width:28px;height:28px;" onclick="deleteUser('${u.email}')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" style="width:12px;height:12px;"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a1 1 0 011-1h4a1 1 0 011 1v2"/></svg></button>`}
      </div>`;
    }).join('');

  window.addAllowedUser = async function(){
    const inp=document.getElementById('umEmailInp');
    const email=(inp?.value||'').trim().toLowerCase();
    if(!email||!email.includes('@')){toast('warn','請輸入有效的 Email');return;}
    if(_umUsers.find(u=>u.email===email)){toast('warn','此帳號已存在');return;}
    try{
      await db.collection('allowedUsers').doc(email).set({email,active:true,addedAt:firebase.firestore.FieldValue.serverTimestamp()});
      inp.value='';
      toast('success',`${email} 已新增`);
    }catch(e){toast('err','新增失敗：'+e.message);}
  };

  window.setUserActive = async function(email,active){
    try{
      await db.collection('allowedUsers').doc(email).update({active});
      toast('success',`${email} 已${active?'啟用':'停用'}`);
    }catch(e){toast('err','操作失敗：'+e.message);}
  };

  window.deleteUser = async function(email){
    if(!confirm(`確定要刪除 ${email}？\n刪除後該帳號將無法登入。`))return;
    try{
      await db.collection('allowedUsers').doc(email).delete();
      toast('warn',`${email} 已刪除`);
    }catch(e){toast('err','刪除失敗：'+e.message);}
  };

  // 即時監聽白名單
  db.collection('allowedUsers').orderBy('addedAt','asc').onSnapshot(snap=>{
    _umUsers=snap.docs.map(d=>({email:d.id,...d.data()}));
    if(document.getElementById('panel-users')?.classList.contains('active')) renderUserList();
  });

  // ── 即時監聯 bookings ──
  db.collection('bookings').onSnapshot(snap=>{
    bookings = snap.docs.map(d=>{
      const v=d.data();
      return {
        id:d.id, fbId:d.id,
        caseNo:v.caseNo||'',
        name:v.name||'', bday:v.bday||'',
        phone:v.phone||'', date:v.date||'',
        slot:v.slot||'', op:v.op||'',
        docId:v.docId||null,
        docName:v.docName||'',
        note:v.note||'',
        status:v.status||'pending',
        lineNotified:v.lineNotified||false,
        selfPayItems:v.selfPayItems||[],
        ts:v.createdAt?.toMillis?.()||Date.now(),
      };
    });
    renderBookings(); renderReview(); updateReviewBadge();
    if(document.getElementById('panel-calendar').classList.contains('active')) renderCal();
    // ── 自動更新 slotCounts（供前端 booking.html 讀取，不含個資）──
    _rebuildSlotCounts();
  });

  // ── 重建 slotCounts：只存 docId:date → {slot:count} ──
  let _scTimer=null;
  async function _rebuildSlotCounts(){
    // 防抖：連續觸發只執行最後一次
    if(_scTimer) clearTimeout(_scTimer);
    _scTimer=setTimeout(async()=>{
      try{
        // 從本地 bookings 計算每個 docId:date 的各時段預約數
        const counts={};
        bookings.filter(b=>b.status==='pending'||b.status==='approved').forEach(b=>{
          const key=b.docId+':'+b.date;
          if(!counts[key]) counts[key]={};
          counts[key][b.slot]=(counts[key][b.slot]||0)+1;
        });
        // 讀取現有 slotCounts，比對差異後只更新有變化的
        const existSnap=await db.collection('slotCounts').get();
        const existMap={};
        existSnap.docs.forEach(d=>{ existMap[d.id]=d.data(); });
        const batch=db.batch();
        let changed=false;
        // 更新/新增有預約的
        Object.entries(counts).forEach(([key,slots])=>{
          if(JSON.stringify(existMap[key]||{})!==JSON.stringify(slots)){
            batch.set(db.collection('slotCounts').doc(key),slots);
            changed=true;
          }
          delete existMap[key];
        });
        // 刪除已無預約的
        Object.keys(existMap).forEach(key=>{
          batch.delete(db.collection('slotCounts').doc(key));
          changed=true;
        });
        if(changed) await batch.commit();
      }catch(e){ console.warn('slotCounts 更新失敗：',e.message); }
    },1000);
  }

  // ── 即時監聽 doctors ──
  db.collection('doctors').onSnapshot(snap=>{
    doctors = snap.docs.map(d=>{
      const v=d.data();
      return {id:v.id,name:v.name||'',title:v.title||'',
        colorId:v.colorId||'c1',limitAM:v.limitAM??3,
        limitPM:v.limitPM??3,weekLimit:v.weekLimit||0,
        ops:(v.ops||[]).map(o=>typeof o==='object'?o:{name:o,desc:''})};
    }).sort((a,b)=>String(a.id).localeCompare(String(b.id)));
    renderDoctors();
    updateReviewBadge();
  });

  // ── 即時監聽 slots ──
  db.collection('slots').onSnapshot(snap=>{
    committedSlotSettings={};
    snap.docs.forEach(d=>{ const v=d.data(); if(v.slots) committedSlotSettings[d.id]=v.slots; });
    // merge：Firebase 已存的為基底，本地未儲存的變更優先覆蓋
    slotSettings=Object.assign({},committedSlotSettings);
    Object.entries(localSlotChanges).forEach(([k,v])=>{
      if(v&&v.length) slotSettings[k]=v;   // 本地新增/修改
      else delete slotSettings[k];           // 本地刪除（空陣列代表刪除）

  });

  // ── 儲存單一醫師 ──

  // ── 刪除醫師 ──
  window._fbDeleteDoctor = function(id){
    db.collection('doctors').doc(String(id)).delete()
      .catch(e=>toast('err','刪除失敗：'+e.message));
  };

  // ── 刪除醫師的所有時段 ──
  window._fbDeleteDoctorSlots = async function(docId){
    try{
      const snap=await db.collection('slots').get();
      const prefix=String(docId)+':';
      const batch=db.batch();
      snap.docs.forEach(d=>{if(d.id.startsWith(prefix)) batch.delete(d.ref);});
      await batch.commit();
    }catch(e){toast('err','刪除時段失敗：'+e.message);}
  };

  // ── 刪除醫師的所有自費項目設定 ──
  window._fbDeleteDoctorOpSettings = async function(docId){
    try{
      const snap=await db.collection('selfpay').doc('opSettings').get();
      if(!snap.exists) return;
      const data=snap.data();
      const prefix=String(docId)+':';
      const keysToDelete=Object.keys(data).filter(k=>k.startsWith(prefix));
      if(!keysToDelete.length) return;
      // 用 FieldValue.delete() 逐一刪除對應 key
      const updates={};
      keysToDelete.forEach(k=>{
        updates[k]=firebase.firestore.FieldValue.delete();
      });
      await db.collection('selfpay').doc('opSettings').update(updates);
    }catch(e){toast('err','刪除自費設定失敗：'+e.message);}
  };

  // ── 儲存所有時段 ──
  window.saveSlotsToDB = async function(){
    const btn=document.querySelector('[onclick="saveSlotsToDB()"]');
    if(btn){btn.disabled=true;btn.textContent='儲存中…';}
    try{
      await Promise.all(Object.entries(slotSettings).map(([k,v])=>
        db.collection('slots').doc(k).set({slots:v})
      ));
      // 清除本地變更記錄（已存進 Firebase）
      localSlotChanges={};
      toast('success','時段已儲存到雲端');
      committedSlotSettings=JSON.parse(JSON.stringify(slotSettings));
    }catch(e){ toast('err','儲存失敗：'+e.message); }
    finally{
      if(btn){btn.disabled=false;btn.innerHTML='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" style="width:14px;height:14px;"><path d="M19 21H5a2 2 0 01-2-2V5a2 2 0 012-2h11l5 5v11a2 2 0 01-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg> 儲存時段';}
    }
  };

  // ── 啟動時清除本月以前的舊時段設定 ──
  (async function purgeOldSlots(){
    try{
      const now=new Date();
      const thisMonthStr=`${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-01`;
      const snap=await db.collection('slots').get();
      if(snap.empty) return;
      const batch=db.batch();
      let count=0;
      snap.docs.forEach(d=>{
        // key 格式：docId:YYYY-MM-DD，取冒號後面的日期
        const datePart=d.id.split(':')[1]||'';
        if(datePart && datePart<thisMonthStr){
          batch.delete(d.ref);
          count++;
        }
      });
      if(count>0){
        await batch.commit();
        console.log(`已刪除 ${count} 筆本月以前的時段設定`);
      }
    }catch(e){console.warn('清除舊時段失敗：',e.message);}
  })();

  // ── 啟動時清除本月以前的舊 bookings（以月為單位）──
  (async function purgeOldBookings(){
    try{
      const now=new Date();
      const cutoffStr=`${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-01`;
      const snap=await db.collection('bookings').where('date','<',cutoffStr).get();
      if(snap.empty) return;
      const batch=db.batch();
      snap.docs.forEach(d=>batch.delete(d.ref));
      await batch.commit();
      console.log(`已刪除 ${snap.docs.length} 筆本月以前的舊預約`);
    }catch(e){console.warn('清除舊資料失敗：',e.message);}
  })();
  window._fbApprove = function(fbId){
    db.collection('bookings').doc(fbId).update({status:'approved'})
      .catch(e=>toast('err','操作失敗'));
  };
  window._fbReject = function(fbId){
    db.collection('bookings').doc(fbId).update({status:'rejected'})
      .catch(e=>toast('err','操作失敗'));
  };
  window._fbDelete = function(fbId){
    db.collection('bookings').doc(fbId).delete()
      .catch(e=>toast('err','刪除失敗'));
  };
  window._fbToggleLine = function(fbId){
    db.collection('bookings').doc(fbId).update({lineNotified:true})
      .catch(e=>toast('err','操作失敗'));
  };
  window._fbAddBooking = async function(data){
    await db.collection('bookings').add(data);
  };

  // ── opSelfPay settings ──
  db.collection('selfpay').doc('opSettings').onSnapshot(snap=>{
    if(snap.exists){
      const v=snap.data();
      Object.assign(opSelfPay, v);
      if(document.getElementById('panel-selfpay').classList.contains('active')) renderOpSelfPaySettings();
    }
  });

  window._fbSaveOpSelfPay = async function(key, cfg){
    try{
      await db.collection('selfpay').doc('opSettings').set({[key]:cfg},{merge:true});
    }catch(e){toast('err','儲存失敗：'+e.message);}
  };

  // ── save edit with selfPayItems ──
  window._fbSaveEdit = function(fbId,data){
    db.collection('bookings').doc(fbId).update(data)
      .catch(e=>toast('err','儲存失敗'));
  };

})();
